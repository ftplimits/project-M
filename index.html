                        const screenX = worldX * gridTransform.zoom + gridTransform.panX;
                        ctx.moveTo(screenX, gridBoundsScreenTop);    // Clipped to grid top
                        ctx.lineTo(screenX, gridBoundsScreenBottom); // Clipped to grid bottom
                    }
                    
                    // Horizontal lines (101 lines for 100 cells) - CLIPPED to grid bounds
                    for (let i = 0; i <= GRID_CELLS_TOTAL; i++) {
                        const worldY = (i - HALF_GRID) * activeScene.grid.size;
                        const screenY = worldY * gridTransform.zoom + gridTransform.panY;
                        ctx.moveTo(gridBoundsScreenLeft, screenY);   // Clipped to grid left
                        ctx.lineTo(gridBoundsScreenRight, screenY);  // Clipped to grid right
                    }
                    
                    ctx.stroke();
                }
            }, [activeScene.grid, gridTransform, gridColor, zonesMode]);
            
            // Persist grid color preference to localStorage
            useEffect(() => {
                localStorage.setItem('gridColor', gridColor);
            }, [gridColor]);
            
            // Layer 4: Token Canvas - renders tokens (redraws when tokens move)
            useEffect(() => {
                const canvas = tokenCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                
                // Render tokens using image cache
                const renderTokens = async () => {
                    for (const token of tokens) {
                         if (token.hidden && !isHost) {
        continue;
    }
                        
                        const baseSize = token.size || 50;
                        const sizeMultiplier = token.sizeMultiplier || 1;
                        const actualSize = baseSize * sizeMultiplier;
                        const transformedX = token.x * gridTransform.zoom + gridTransform.panX;
                        const transformedY = token.y * gridTransform.zoom + gridTransform.panY;
                        const transformedSize = actualSize * gridTransform.zoom;
                        
                        // Check if this token's assigned player is talking
                        const isTalking = token.assignedPlayerId && talkingPlayers.has(token.assignedPlayerId);
                        
                        // Check cache first
                        let img = imageCache.current.get(token.src);
                        if (!img) {
                            img = new Image();
                            img.src = token.src;
                            imageCache.current.set(token.src, img);
                            
                            // Wait for new image to load
                            if (!img.complete) {
                                await new Promise((resolve) => {
                                    img.onload = resolve;
                                    img.onerror = resolve; // Continue on error
                                });
                            }
                        }
                        
                        // Skip rendering if image failed to load or is in broken state
                        if (img.complete && img.naturalWidth > 0 && img.naturalHeight > 0) {
                            ctx.save();
                            // Dim locked tokens OR hidden tokens (for host)
                            ctx.globalAlpha = (token.locked || (token.hidden && isHost)) ? 0.5 : 1.0;
                            
                            // Draw gold glow if token is talking
                            if (isTalking) {
                                ctx.save();
                                ctx.shadowColor = '#d4af37';
                                ctx.shadowBlur = 30;
                                ctx.fillStyle = 'rgba(212, 175, 55, 0.3)';
                                ctx.beginPath();
                                ctx.arc(
                                    transformedX + transformedSize / 2, 
                                    transformedY + transformedSize / 2, 
                                    transformedSize / 2 + 10, 
                                    0, 
                                    2 * Math.PI
                                );
                                ctx.fill();
                                ctx.restore();
                            }
                            
                            // Apply horizontal flip if needed (check for undefined to support old tokens)
                            if (token.flipped === true) {
                                ctx.translate(transformedX + transformedSize / 2, transformedY + transformedSize / 2);
                                ctx.scale(-1, 1);
                                ctx.translate(-(transformedX + transformedSize / 2), -(transformedY + transformedSize / 2));
                            }
                            
                            // Draw token as circle (clip to circle)
                            ctx.beginPath();
                            ctx.arc(
                                transformedX + transformedSize / 2, 
                                transformedY + transformedSize / 2, 
                                transformedSize / 2, 
                                0, 
                                2 * Math.PI
                            );
                            ctx.closePath();
                            ctx.clip();
                            
                            ctx.drawImage(img, transformedX, transformedY, transformedSize, transformedSize);
                            ctx.restore();
                            
                            // Draw red tint overlay for hidden tokens (host only)
                            if (token.hidden && isHost) {
                                ctx.save();
                                ctx.fillStyle = 'rgba(220, 53, 69, 0.35)'; // Red tint with 35% opacity
                                ctx.beginPath();
                                ctx.arc(
                                    transformedX + transformedSize / 2, 
                                    transformedY + transformedSize / 2, 
                                    transformedSize / 2, 
                                    0, 
                                    2 * Math.PI
                                );
                                ctx.fill();
                                ctx.restore();
                            }
                            
                            // Draw border if token has borderColor
                            if (token.borderColor) {
                                ctx.save();
                                ctx.strokeStyle = token.borderColor;
                                ctx.lineWidth = Math.max(4, transformedSize * 0.08); // Border scales with token
                                ctx.beginPath();
                                ctx.arc(
                                    transformedX + transformedSize / 2, 
                                    transformedY + transformedSize / 2, 
                                    transformedSize / 2, 
                                    0, 
                                    2 * Math.PI
                                );
                                ctx.stroke();
                                ctx.restore();
                            }
                            
                            // Draw chat bubble emoji if token is talking (only when GRID is ON)
                            if (isTalking && activeScene.grid?.enabled) {
                                ctx.save();
                                const bubbleSize = Math.max(24, transformedSize * 0.45);
                                ctx.font = `${bubbleSize}px Arial`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                // Position chat bubble above token
                                const bubbleX = transformedX + transformedSize / 2 + 30;
                                const bubbleY = transformedY - bubbleSize * 0.45;
                                
                                // Draw chat bubble emoji (no background)
                                ctx.fillText('💬', bubbleX, bubbleY);
                                ctx.restore();
                            }
                            
                            // Draw token name label
                            if (token.name) {
                                ctx.save();
                                const labelY = transformedY + transformedSize - 8;
                                const fontSize = Math.max(12, transformedSize * 0.16);
                                ctx.font = `bold ${fontSize}px Times New Roman, serif`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                // Measure text for background
                                const text = token.name || 'Token';
                                const metrics = ctx.measureText(text);
                                const padding = 6;
                                const bgX = transformedX + transformedSize / 2 - metrics.width / 2 - padding;
                                const bgY = labelY - fontSize / 2 - 1;
                                const bgWidth = metrics.width + padding * 2;
                                const bgHeight = fontSize + 2;
                                
                                // Draw background
                                ctx.fillStyle = 'rgba(26, 26, 26, 0.95)';
                                ctx.fillRect(bgX, bgY, bgWidth, bgHeight);
                                
                                // Draw text
                                ctx.fillStyle = '#d4af37';
                                ctx.fillText(text, transformedX + transformedSize / 2, labelY);
                                ctx.restore();
                            }
                            
                            // Draw condition emoji if token has one
                            if (token.conditionEmoji) {
                                ctx.save();
                                const emojiSize = Math.max(20, transformedSize * 0.35);
                                ctx.font = `${emojiSize}px Arial`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                // Position emoji at top-right of token
                                const emojiX = transformedX + transformedSize - emojiSize * 0.4;
                                const emojiY = transformedY + emojiSize * 0.4;
                                
                                // Draw background circle for emoji
                                ctx.fillStyle = 'rgba(26, 26, 26, 0.9)';
                                ctx.beginPath();
                                ctx.arc(emojiX, emojiY, emojiSize * 0.6, 0, 2 * Math.PI);
                                ctx.fill();
                                
                                // Draw emoji
                                ctx.fillText(token.conditionEmoji, emojiX, emojiY);
                                ctx.restore();
                            }
                            
                            // Draw HP counter if enabled for this token
                            if (token.hpCounterEnabled && token.hp !== undefined) {
                                ctx.save();
                                const counterSize = Math.max(18, transformedSize * 0.25);
                                const fontSize = Math.max(11, counterSize * 0.6);
                                
                                // Position at top-left of token
                                const counterX = transformedX + counterSize * 0.5;
                                const counterY = transformedY + counterSize * 0.5;
                                
                                // Draw background box
                                ctx.fillStyle = 'rgba(26, 26, 26, 0.95)';
                                ctx.strokeStyle = '#d4af37';
                                ctx.lineWidth = 2;
                                ctx.beginPath();
                                ctx.roundRect(counterX - counterSize * 0.45, counterY - counterSize * 0.45, counterSize, counterSize, 4);
                                ctx.fill();
                                ctx.stroke();
                                
                                // Draw HP value
                                ctx.fillStyle = '#d4af37';
                                ctx.font = `bold ${fontSize}px Arial`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText(token.hp.toString(), counterX, counterY + 2);
                                ctx.restore();
                            }
                            
                        }
                    }
                };
                
                renderTokens().catch(err => console.error('Token rendering error:', err));
            }, [tokens, activeScene.grid?.enabled, gridTransform, talkingPlayers]);
            
            // Layer 4.5: Fog Canvas - renders fog of war (above tokens)
            useEffect(() => {
                const canvas = fogCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                
                // Render completed fog shapes
                for (const shape of fogShapes) {
                    if (shape.points.length < 3) continue;
                    
                    ctx.beginPath();
                    const firstPoint = shape.points[0];
                    ctx.moveTo(
                        firstPoint.x * gridTransform.zoom + gridTransform.panX,
                        firstPoint.y * gridTransform.zoom + gridTransform.panY
                    );
                    
                    for (let i = 1; i < shape.points.length; i++) {
                        const point = shape.points[i];
                        ctx.lineTo(
                            point.x * gridTransform.zoom + gridTransform.panX,
                            point.y * gridTransform.zoom + gridTransform.panY
                        );
                    }
                    ctx.closePath();
                    
                    // Fill with black - opacity depends on visibility and isHost
                    if (shape.visible) {
                        // Visible fog: normal opacity for both host and players
                        ctx.fillStyle = isHost ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 1.0)';
                        ctx.fill();
                    } else if (isHost) {
                        // Hidden fog: only show transparent fill for host (revealed areas)
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                        ctx.fill();
                    }
                    // Players don't see hidden fog at all (no fill or outline)
                    
                    // Red outline (always visible to host, even when fog is hidden)
                    if (isHost) {
                        ctx.strokeStyle = '#ff0000';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
                
                // Render current fog shape being drawn (only for host)
                if (currentFogShape && isHost) {
                    const shape = currentFogShape;
                    if (shape.points.length >= 2) {
                        ctx.beginPath();
                        const firstPoint = shape.points[0];
                        ctx.moveTo(
                            firstPoint.x * gridTransform.zoom + gridTransform.panX,
                            firstPoint.y * gridTransform.zoom + gridTransform.panY
                        );
                        
                        for (let i = 1; i < shape.points.length; i++) {
                            const point = shape.points[i];
                            ctx.lineTo(
                                point.x * gridTransform.zoom + gridTransform.panX,
                                point.y * gridTransform.zoom + gridTransform.panY
                            );
                        }
                        
                        // Preview line back to start
                        ctx.strokeStyle = '#ff0000';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.lineTo(
                            firstPoint.x * gridTransform.zoom + gridTransform.panX,
                            firstPoint.y * gridTransform.zoom + gridTransform.panY
                        );
                        ctx.stroke();
                        ctx.setLineDash([]);
                        
                        // Show preview fill
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                        ctx.fill();
                    }
                    
                    // Draw points
                    for (const point of shape.points) {
                        ctx.fillStyle = '#ff0000';
                        ctx.beginPath();
                        ctx.arc(
                            point.x * gridTransform.zoom + gridTransform.panX,
                            point.y * gridTransform.zoom + gridTransform.panY,
                            5,
                            0,
                            2 * Math.PI
                        );
                        ctx.fill();
                    }
                }
                
            }, [fogShapes, currentFogShape, activeScene.grid?.enabled, gridTransform, isHost]);
            
            // Weather Effects Rendering
            useEffect(() => {
                const canvas = weatherCanvasRef.current;
                if (!canvas || !activeScene.weatherEffect || activeScene.grid?.enabled) return;

                const ctx = canvas.getContext('2d');
                const particles = [];
                const sandParticles = []; // Extra particles for sand
                
                // Fog and Sand use fewer, larger blobs
                const particleCount = activeScene.weatherEffect === 'fog' || activeScene.weatherEffect === 'sand'
                    ? 12 
                    : activeScene.weatherEffect === 'embers' 
                    ? 50 
                    : 150;
                
                // Sand gets extra small particles
                const sandParticleCount = 100;

                const resizeCanvas = () => {
                    const rect = canvas.getBoundingClientRect();
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                };

                resizeCanvas();

                // Initialize particles
                for (let i = 0; i < particleCount; i++) {
                    if (activeScene.weatherEffect === 'fog') {
                        // Fog blobs - large elliptical shapes (bluish-gray)
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            radius: 150 + Math.random() * 250, // 150-400px
                            scaleX: 1.2 + Math.random() * 0.8, // 1.2-2.0 (wider)
                            scaleY: 0.6 + Math.random() * 0.4, // 0.6-1.0 (flatter)
                            rotation: Math.random() * Math.PI * 2, // random angle
                            speedX: 0.1 + Math.random() * 0.3,
                            speedY: 0.05 + Math.random() * 0.15,
                            opacity: 0.05 + Math.random() * 0.1 // very subtle
                        });
                    } else if (activeScene.weatherEffect === 'sand') {
                        // Sand blobs - large elliptical shapes (tan/beige)
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            radius: 150 + Math.random() * 250, // 150-400px
                            scaleX: 1.2 + Math.random() * 0.8, // 1.2-2.0 (wider)
                            scaleY: 0.6 + Math.random() * 0.4, // 0.6-1.0 (flatter)
                            rotation: Math.random() * Math.PI * 2, // random angle
                            speedX: 0.5 + Math.random() * 1.5, // FASTER than fog
                            speedY: 0.2 + Math.random() * 0.6,
                            opacity: 0.08 + Math.random() * 0.12 // slightly more visible
                        });
                    } else {
                        // Other particle effects
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            speed: activeScene.weatherEffect === 'rain' 
                                ? 3 + Math.random() * 5 
                                : activeScene.weatherEffect === 'snow'
                                ? 1 + Math.random() * 2
                                : -0.5 - Math.random() * 1, // embers rise
                            size: activeScene.weatherEffect === 'rain'
                                ? 1 + Math.random() * 2
                                : activeScene.weatherEffect === 'snow'
                                ? 3 + Math.random() * 3
                                : 2 + Math.random() * 3,
                            opacity: 0.3 + Math.random() * 0.7,
                            drift: activeScene.weatherEffect === 'snow' ? (Math.random() - 0.5) * 0.5 : 0
                        });
                    }
                }
                
                // Initialize sand particles (small gritty dots)
                if (activeScene.weatherEffect === 'sand') {
                    for (let i = 0; i < sandParticleCount; i++) {
                        sandParticles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            speedX: 2 + Math.random() * 4, // Fast horizontal movement
                            speedY: 0.5 + Math.random() * 1.5, // Slight downward
                            size: 1 + Math.random() * 2, // Small dots
                            opacity: 0.3 + Math.random() * 0.5
                        });
                    }
                }

                let animationFrameId;
                const animate = () => {
                    const rect = canvas.getBoundingClientRect();
                    ctx.clearRect(0, 0, rect.width, rect.height);

                    particles.forEach(particle => {
                        if (activeScene.weatherEffect === 'fog') {
                            // Render elliptical fog blobs (bluish-gray)
                            ctx.save();
                            ctx.translate(particle.x, particle.y);
                            ctx.rotate(particle.rotation);
                            ctx.scale(particle.scaleX, particle.scaleY);
                            
                            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, particle.radius);
                            gradient.addColorStop(0, `rgba(200, 200, 220, ${particle.opacity})`);
                            gradient.addColorStop(0.5, `rgba(180, 180, 200, ${particle.opacity * 0.5})`);
                            gradient.addColorStop(1, 'rgba(160, 160, 180, 0)');
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(-particle.radius, -particle.radius, particle.radius * 2, particle.radius * 2);
                            ctx.restore();
                            
                            // Update fog blob position (slow drift)
                            particle.x += particle.speedX;
                            particle.y += particle.speedY;
                            
                            // Wrap around
                            if (particle.x > rect.width + particle.radius) particle.x = -particle.radius;
                            if (particle.x < -particle.radius) particle.x = rect.width + particle.radius;
                            if (particle.y > rect.height + particle.radius) particle.y = -particle.radius;
                            if (particle.y < -particle.radius) particle.y = rect.height + particle.radius;
                            
                        } else if (activeScene.weatherEffect === 'sand') {
                            // Render elliptical sand blobs (tan/beige)
                            ctx.save();
                            ctx.translate(particle.x, particle.y);
                            ctx.rotate(particle.rotation);
                            ctx.scale(particle.scaleX, particle.scaleY);
                            
                            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, particle.radius);
                            gradient.addColorStop(0, `rgba(210, 180, 140, ${particle.opacity})`); // Tan
                            gradient.addColorStop(0.5, `rgba(194, 158, 114, ${particle.opacity * 0.5})`);
                            gradient.addColorStop(1, 'rgba(178, 136, 88, 0)');
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(-particle.radius, -particle.radius, particle.radius * 2, particle.radius * 2);
                            ctx.restore();
                            
                            // Update sand blob position (faster drift)
                            particle.x += particle.speedX;
                            particle.y += particle.speedY;
                            
                            // Wrap around
                            if (particle.x > rect.width + particle.radius) particle.x = -particle.radius;
                            if (particle.x < -particle.radius) particle.x = rect.width + particle.radius;
                            if (particle.y > rect.height + particle.radius) particle.y = -particle.radius;
                            if (particle.y < -particle.radius) particle.y = rect.height + particle.radius;
                            
                        } else if (activeScene.weatherEffect === 'rain') {
                            ctx.fillStyle = `rgba(174, 194, 224, ${particle.opacity})`;
                            ctx.fillRect(particle.x, particle.y, particle.size, 10);
                        } else if (activeScene.weatherEffect === 'snow') {
                            ctx.fillStyle = `rgba(255, 255, 255, ${particle.opacity})`;
                            ctx.beginPath();
                            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                            ctx.fill();
                        } else if (activeScene.weatherEffect === 'embers') {
                            const gradient = ctx.createRadialGradient(
                                particle.x, particle.y, 0,
                                particle.x, particle.y, particle.size
                            );
                            gradient.addColorStop(0, `rgba(255, 220, 100, ${particle.opacity})`);
                            gradient.addColorStop(0.5, `rgba(255, 140, 50, ${particle.opacity * 0.8})`);
                            gradient.addColorStop(1, `rgba(200, 50, 20, 0)`);
                            ctx.fillStyle = gradient;
                            ctx.beginPath();
                            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        // Update position for non-fog/sand particles
                        if (activeScene.weatherEffect !== 'fog' && activeScene.weatherEffect !== 'sand') {
                            particle.y += particle.speed;
                            particle.x += particle.drift;

                            // Wrap around
                            if (activeScene.weatherEffect === 'embers') {
                                if (particle.y < 0) particle.y = rect.height;
                            } else {
                                if (particle.y > rect.height) particle.y = 0;
                            }
                            if (particle.x > rect.width) particle.x = 0;
                            if (particle.x < 0) particle.x = rect.width;
                        }
                    });
                    
                    // Render sand particles (small gritty dots)
                    if (activeScene.weatherEffect === 'sand') {
                        sandParticles.forEach(sp => {
                            ctx.fillStyle = `rgba(210, 180, 140, ${sp.opacity})`; // Tan color
                            ctx.beginPath();
                            ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI * 2);
                            ctx.fill();
                            
                            // Update sand particle position
                            sp.x += sp.speedX;
                            sp.y += sp.speedY;
                            
                            // Wrap around
                            if (sp.x > rect.width) sp.x = 0;
                            if (sp.y > rect.height) sp.y = 0;
                        });
                    }

                    animationFrameId = requestAnimationFrame(animate);
                };

                animate();
                window.addEventListener('resize', resizeCanvas);

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resizeCanvas);
                };
            }, [activeScene.weatherEffect, activeScene.grid?.enabled]);
            
            // Layer 5: UI Canvas - renders pointer and measurement (60fps when active)
            useEffect(() => {
                const canvas = uiCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                
                // Clear canvas - UI elements rendered elsewhere for now
                ctx.clearRect(0, 0, width, height);
                
                // NOTE: Animation loop only starts when needed (pointer active, measurement active, etc.)
                // This saves CPU cycles when no real-time UI elements are being rendered
            }, [activeScene.grid?.enabled]);

            useEffect(() => {
                const repositionAvatars = () => {
                    if (!viewportRef.current) return;
                    setAvatars(prev => {
                        if (!prev || prev.length === 0) return prev;
                        const viewportRect = viewportRef.current.getBoundingClientRect();
                        const vw = viewportRect.width;
                        const vh = viewportRect.height;
                        const avatarWidth = prev[0].width || 180;
                        const avatarHeight = prev[0].height || 225;
                        const spacing = avatarWidth + 30;
                        const totalWidth = (prev.length - 1) * spacing + avatarWidth;
                        const startX = (vw / 2) - (totalWidth / 2);
                        const yPos = vh - avatarHeight - 50;
                        return prev.map((av, i) => ({
                            ...av,
                            x: startX + i * spacing,
                            y: yPos,
                            width: avatarWidth,
                            height: avatarHeight
                        }));
                    });
                };
                repositionAvatars();
                window.addEventListener('resize', repositionAvatars);
                return () => window.removeEventListener('resize', repositionAvatars);
            }, [avatars.length, viewportRef.current]);

            const saveScenesToLocalStorage = () => {
                try {
                    const payload = {
                        scenes,
                        avatars,
                        tokens,
                        drawings,
                        fogShapes,
                        activeSceneIndex,
                        gridTransform,
                        characterSheets,
                        diceModifiers
                    };
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(payload));
                    alert('Saved to localStorage.');
                } catch (err) {
                    console.error('Save failed', err);
                    alert('Save failed (see console).');
                }
            };

            const loadScenesFromLocalStorage = () => {
                const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (!raw) {
                    alert('No saved data found in localStorage.');
                    return;
                }
                if (!confirm('Load from localStorage? This will replace your current scenes and state.')) return;
                try {

                            } else {

                        setDrawings(parsed.drawings || []);

                        setActiveSceneIndex(parsed.activeSceneIndex || 0);

                                    return { ...a, y: safeY, flipped: !!a.flipped };
                                });

                            } else {

                                parsed.scenes.forEach(s => {

                                    }

                                return;
                            }
                            const collected = [];
                            parsed.forEach(s => {
