                            className="w-12 h-12 bg-amber-600 hover:bg-amber-500 text-zinc-900 font-bold rounded-full border-4 border-amber-700 shadow-2xl transition-all hover:scale-110 flex items-center justify-center"
                            style={{
                                boxShadow: '0 0 30px rgba(212, 175, 55, 0.7)'
                            }}
                            title="Add Player Avatar"
                            disabled={!isHost && isConnected}
                        >
                            <Plus size={28} />
                        </button>
                    </div>

                                        <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        onChange={handleImageUpload}
                        className="hidden"
                    />
                    <input
                        ref={avatarInputRef}
                        type="file"
                        accept="image/png,image/jpeg,image/jpg,image/webp"
                        onChange={handleAvatarUpload}
                        className="hidden"
                    />
                    <input
                        ref={tokenInputRef}
                        type="file"
                        accept="image/png,image/jpeg,image/webp"
                        onChange={handleTokenUpload}
                        className="hidden"
                    />
                    <input
                        ref={gridImageInputRef}
                        type="file"
                        accept="image/*"
                        onChange={handleGridImageUpload}
                        className="hidden"
                    />
                    <input
                        ref={importInputRef}
                        type="file"
                        accept="application/json"
                        onChange={handleImportFile}
                        className="hidden"
                    />
                    <input
                        ref={handoutInputRef}
                        type="file"
                        accept="image/*"
                        onChange={handleHandoutUpload}
                        className="hidden"
                    />

                    {/* Real-time Pointer Tool */}
                    {/* Show local player's pointer */}
                    {isPointerActive && (
                        <div
                            style={{
                                position: 'fixed',
                                left: pointerPosition.x,
                                top: pointerPosition.y,
                                pointerEvents: 'none',
                                zIndex: 9999,
                                transform: 'translate(-50%, 0%)',
                                transition: 'none'
                            }}
                        >
                            {/* Arrow pointer (upward facing, tip at cursor) */}
                            <div style={{
                                fontSize: '32px',
                                color: '#d4af37',
                                textShadow: '0 0 8px rgba(212, 175, 55, 0.8), 0 2px 4px rgba(0, 0, 0, 0.8)',
                                lineHeight: '0.8',
                                marginBottom: '2px',
                                textAlign: 'center',
                                marginTop: '-4px'
                            }}>
                                ▲
                            </div>
                            {/* Player name */}
                            <div style={{
                                backgroundColor: 'rgba(0, 0, 0, 0.85)',
                                color: '#d4af37',
                                padding: '4px 10px',
                                borderRadius: '6px',
                                fontSize: '13px',
                                fontWeight: 'bold',
                                fontFamily: 'Georgia, serif',
                                whiteSpace: 'nowrap',
                                border: '2px solid #d4af37',
                                boxShadow: '0 0 12px rgba(212, 175, 55, 0.6), 0 2px 8px rgba(0, 0, 0, 0.8)',
                                textAlign: 'center'
                            }}>
                                {playerName}
                            </div>
                        </div>
                    )}

                    {/* Show other players' pointers */}
                    {Object.entries(activePointers).map(([name, pos]) => (
                        <div
                            key={name}
                            style={{
                                position: 'fixed',
                                left: pos.x,
                                top: pos.y,
                                pointerEvents: 'none',
                                zIndex: 9999,
                                transform: 'translate(-50%, 0%)',
                                transition: 'none'
                            }}
                        >
                            {/* Arrow pointer (upward facing, tip at cursor) */}
                            <div style={{
                                fontSize: '32px',
                                color: '#4ecdc4',
                                textShadow: '0 0 8px rgba(78, 205, 196, 0.8), 0 2px 4px rgba(0, 0, 0, 0.8)',
                                lineHeight: '0.8',
                                marginBottom: '2px',
                                textAlign: 'center',
                                marginTop: '-4px'
                            }}>
                                ▲
                            </div>
                            {/* Player name */}
                            <div style={{
                                backgroundColor: 'rgba(0, 0, 0, 0.85)',
                                color: '#4ecdc4',
                                padding: '4px 10px',
                                borderRadius: '6px',
                                fontSize: '13px',
                                fontWeight: 'bold',
                                fontFamily: 'Georgia, serif',
                                whiteSpace: 'nowrap',
                                border: '2px solid #4ecdc4',
                                boxShadow: '0 0 12px rgba(78, 205, 196, 0.6), 0 2px 8px rgba(0, 0, 0, 0.8)',
                                textAlign: 'center'
                            }}>
                                {name}
                            </div>
                        </div>
                    ))}
                    
                    {/* Handout Popup */}
                    {handoutVisible && handoutImage && (
                        <div
                            style={{
                                position: 'fixed',
                                top: 0,
                                left: 0,
                                right: 0,
                                bottom: 0,
                                backgroundColor: 'rgba(0, 0, 0, 0.50)',
                                zIndex: 10000,
                                display: 'flex',
                                alignItems: 'flex-start',
                                justifyContent: 'center',
                                padding: '40px'
                            }}
                            onClick={() => setHandoutVisible(false)}
                        >
                            <div
                                style={{
                                    position: 'relative',
                                    maxWidth: '75%',
                                    maxHeight: '75%',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center'
                                }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <img
                                    src={handoutImage}
                                    alt="Handout"
                                    style={{
                                        maxWidth: '100%',
                                        maxHeight: 'calc(100vh - 120px)',
                                        objectFit: 'contain',
                                        border: '4px solid #d4af37',
                                        borderRadius: '8px',
                                        boxShadow: '0 0 40px rgba(212, 175, 55, 0.6)'
                                    }}
                                />
                                <button
                                    onClick={() => setHandoutVisible(false)}
                                    style={{
                                        position: 'absolute',
                                        top: '-20px',
                                        right: '-20px',
                                        width: '48px',
                                        height: '48px',
                                        backgroundColor: '#dc3545',
                                        color: '#fff',
                                        border: '3px solid #fff',
                                        borderRadius: '50%',
                                        fontSize: '24px',
                                        fontWeight: 'bold',
                                        cursor: 'pointer',
                                        boxShadow: '0 4px 12px rgba(0,0,0,0.6)',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        fontFamily: 'Arial, sans-serif'
                                    }}
                                    onMouseEnter={(e) => {
                                        e.currentTarget.style.transform = 'scale(1.1)';
                                        e.currentTarget.style.backgroundColor = '#c82333';
                                    }}
                                    onMouseLeave={(e) => {
                                        e.currentTarget.style.transform = 'scale(1)';
                                        e.currentTarget.style.backgroundColor = '#dc3545';
                                    }}
                                >
                                    ✕
                                </button>
                                <div
                                    style={{
                                        marginTop: '16px',
                                        color: '#d4af37',
                                        fontSize: '16px',
                                        fontWeight: 'bold',
                                        fontFamily: 'Georgia, serif',
                                        textAlign: 'center'
                                    }}
                                >
                                    Click anywhere to close
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Creating Game Dialog */}
                    {showCreatingDialog && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #d4af37',
                                borderRadius: '12px',
                                padding: '40px 60px',
                                boxShadow: '0 8px 32px rgba(212, 175, 55, 0.4)',
                                textAlign: 'center'
                            }}>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#d4af37',
                                    fontFamily: 'Georgia, serif',
                                    marginBottom: '15px'
                                }}>
                                    Creating game, Please wait...
                                </div>
                                <div style={{
                                    fontSize: '32px',
                                    animation: 'spin 1s linear infinite'
                                }}>
                                    ⏳
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Session Created Message */}
                    {sessionCreatedMessage && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            animation: 'fadeIn 0.3s ease-in'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #d4af37',
                                borderRadius: '12px',
                                padding: '40px 60px',
                                boxShadow: '0 8px 32px rgba(212, 175, 55, 0.4)',
                                textAlign: 'center'
                            }}>
                                <div style={{
                                    fontSize: '24px',
                                    marginBottom: '10px'
                                }}>
                                    ✅
                                </div>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#d4af37',
                                    fontFamily: 'Georgia, serif'
                                }}>
                                    Session created!
                                </div>
                                <div style={{
                                    fontSize: '16px',
                                    color: '#4ecdc4',
                                    fontFamily: 'Arial, sans-serif',
                                    marginTop: '8px'
                                }}>
                                    Link copied to clipboard
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Waiting for Host Dialog */}
                    {showWaitingDialog && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #d4af37',
                                borderRadius: '12px',
                                padding: '40px 60px',
                                boxShadow: '0 8px 32px rgba(212, 175, 55, 0.4)',
                                textAlign: 'center'
                            }}>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#d4af37',
                                    fontFamily: 'Georgia, serif',
                                    marginBottom: '15px'
                                }}>
                                    Waiting for Host to admit...
                                </div>
                                <div style={{
                                    fontSize: '32px',
                                    animation: 'pulse 2s ease-in-out infinite'
                                }}>
                                    ⏳
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Denied Message */}
                    {deniedMessage && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #dc3545',
                                borderRadius: '12px',
                                padding: '40px 60px',
                                boxShadow: '0 8px 32px rgba(220, 53, 69, 0.4)',
                                textAlign: 'center'
                            }}>
                                <div style={{
                                    fontSize: '24px',
                                    marginBottom: '10px'
                                }}>
                                    ❌
                                </div>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#dc3545',
                                    fontFamily: 'Georgia, serif'
                                }}>
                                    Host denied your request
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Kicked Message */}
                    {kickedMessage && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #dc3545',
                                borderRadius: '12px',
                                padding: '40px 60px',
                                boxShadow: '0 8px 32px rgba(220, 53, 69, 0.4)',
                                textAlign: 'center'
                            }}>
                                <div style={{
                                    fontSize: '24px',
                                    marginBottom: '10px'
                                }}>
                                    ⚠️
                                </div>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#dc3545',
                                    fontFamily: 'Georgia, serif'
                                }}>
                                    You were kicked by the host
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Admit/Deny Dialog */}
                    {showAdmitDialog && currentJoinRequest && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #d4af37',
                                borderRadius: '12px',
                                padding: '40px 50px',
                                boxShadow: '0 8px 32px rgba(212, 175, 55, 0.4)',
                                textAlign: 'center',
                                minWidth: '400px'
                            }}>
                                <div style={{
                                    fontSize: '22px',
                                    fontWeight: 'bold',
                                    color: '#d4af37',
                                    fontFamily: 'Georgia, serif',
                                    marginBottom: '30px'
                                }}>
                                    {currentJoinRequest.name} wants to join
                                </div>
                                <div style={{
                                    display: 'flex',
                                    gap: '15px',
                                    justifyContent: 'center'
                                }}>
                                    <button
                                        onClick={admitPlayer}
                                        style={{
                                            padding: '15px 40px',
                                            backgroundColor: '#d4af37',
                                            color: '#000',
                                            border: 'none',
                                            borderRadius: '8px',
                                            fontSize: '18px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontFamily: 'Georgia, serif',
                                            transition: 'transform 0.1s, background-color 0.2s',
                                            boxShadow: '0 4px 12px rgba(212, 175, 55, 0.4)'
                                        }}
                                        onMouseEnter={(e) => {
                                            e.currentTarget.style.transform = 'scale(1.05)';
                                            e.currentTarget.style.backgroundColor = '#f5c842';
                                        }}
                                        onMouseLeave={(e) => {
                                            e.currentTarget.style.transform = 'scale(1)';
                                            e.currentTarget.style.backgroundColor = '#d4af37';
                                        }}
                                    >
                                        Admit
                                    </button>
                                    <button
                                        onClick={denyPlayer}
                                        style={{
                                            padding: '15px 40px',
                                            backgroundColor: '#dc3545',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '8px',
                                            fontSize: '18px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontFamily: 'Georgia, serif',
                                            transition: 'transform 0.1s, background-color 0.2s',
                                            boxShadow: '0 4px 12px rgba(220, 53, 69, 0.4)'
                                        }}
                                        onMouseEnter={(e) => {
                                            e.currentTarget.style.transform = 'scale(1.05)';
                                            e.currentTarget.style.backgroundColor = '#c82333';
                                        }}
                                        onMouseLeave={(e) => {
                                            e.currentTarget.style.transform = 'scale(1)';
                                            e.currentTarget.style.backgroundColor = '#dc3545';
                                        }}
                                    >
                                        Deny
                                    </button>
                                </div>
                                {pendingJoinRequests.length > 1 && (
                                    <div style={{
                                        marginTop: '20px',
                                        color: '#888',
                                        fontSize: '14px',
                                        fontFamily: 'Arial, sans-serif'
                                    }}>
                                        {pendingJoinRequests.length - 1} more player(s) waiting...
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* Player Context Menu */}
                    {playerContextMenu && (
                        <>
                            <div 
                                style={{
                                    position: 'fixed',
                                    top: 0,
                                    left: 0,
                                    right: 0,
                                    bottom: 0,
                                    zIndex: 2999
                                }}
                                onClick={() => setPlayerContextMenu(null)}
                            />
                            <div style={{
                                position: 'fixed',
                                left: playerContextMenu.x,
                                top: playerContextMenu.y,
                                backgroundColor: '#1a1a1a',
                                border: '2px solid #d4af37',
                                borderRadius: '8px',
                                padding: '8px',
                                zIndex: 3000,
                                boxShadow: '0 4px 12px rgba(0,0,0,0.8)',
                                minWidth: '160px'
                            }}>
                                <button
                                    onClick={() => {
                                        setKickConfirmation({
                                            playerId: playerContextMenu.playerId,
                                            playerName: playerContextMenu.playerName
                                        });
                                        setPlayerContextMenu(null);
                                    }}
                                    style={{
                                        width: '100%',
                                        padding: '10px 15px',
                                        backgroundColor: '#2a2a2a',
                                        color: '#e0e0e0',
                                        border: '1px solid #444',
                                        borderRadius: '4px',
                                        cursor: 'pointer',
                                        fontSize: '14px',
                                        fontFamily: 'Arial, sans-serif',
                                        fontWeight: 'bold',
                                        transition: 'all 0.2s',
                                        textAlign: 'left'
                                    }}
                                    onMouseEnter={(e) => {
                                        e.currentTarget.style.backgroundColor = '#3a3a3a';
                                        e.currentTarget.style.borderColor = '#d4af37';
                                        e.currentTarget.style.color = '#d4af37';
                                    }}
                                    onMouseLeave={(e) => {
                                        e.currentTarget.style.backgroundColor = '#2a2a2a';
                                        e.currentTarget.style.borderColor = '#444';
                                        e.currentTarget.style.color = '#e0e0e0';
                                    }}
                                >
                                    🚫 Kick Player
                                </button>
                            </div>
                        </>
                    )}
                    
                    {/* Kick Confirmation Dialog */}
                    {kickConfirmation && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            zIndex: 10000,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{
                                backgroundColor: '#1a1a1a',
                                border: '3px solid #dc3545',
                                borderRadius: '12px',
                                padding: '30px 40px',
                                boxShadow: '0 8px 32px rgba(220, 53, 69, 0.4)',
                                textAlign: 'center',
                                minWidth: '400px'
                            }}>
                                <div style={{
                                    fontSize: '20px',
                                    fontWeight: 'bold',
                                    color: '#e0e0e0',
                                    fontFamily: 'Georgia, serif',
                                    marginBottom: '20px'
                                }}>
                                    Kick {kickConfirmation.playerName} from the session?
                                </div>
                                <div style={{
                                    display: 'flex',
                                    gap: '15px',
                                    justifyContent: 'center'
                                }}>
                                    <button
                                        onClick={() => {
                                            kickPlayer(kickConfirmation.playerId, kickConfirmation.playerName);
                                            setKickConfirmation(null);
                                        }}
                                        style={{
                                            padding: '12px 30px',
                                            backgroundColor: '#dc3545',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '8px',
                                            fontSize: '16px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontFamily: 'Georgia, serif',
                                            transition: 'transform 0.1s, background-color 0.2s',
                                            boxShadow: '0 4px 12px rgba(220, 53, 69, 0.4)'
                                        }}
                                        onMouseEnter={(e) => {
                                            e.currentTarget.style.transform = 'scale(1.05)';
                                            e.currentTarget.style.backgroundColor = '#c82333';
                                        }}
                                        onMouseLeave={(e) => {
                                            e.currentTarget.style.transform = 'scale(1)';
                                            e.currentTarget.style.backgroundColor = '#dc3545';
                                        }}
                                    >
                                        Yes
                                    </button>
                                    <button
                                        onClick={() => setKickConfirmation(null)}
                                        style={{
                                            padding: '12px 30px',
                                            backgroundColor: '#4ecdc4',
                                            color: '#000',
                                            border: 'none',
                                            borderRadius: '8px',
                                            fontSize: '16px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontFamily: 'Georgia, serif',
                                            transition: 'transform 0.1s, background-color 0.2s',
                                            boxShadow: '0 4px 12px rgba(78, 205, 196, 0.4)'
                                        }}
                                        onMouseEnter={(e) => {
                                            e.currentTarget.style.transform = 'scale(1.05)';
                                            e.currentTarget.style.backgroundColor = '#3dbdb3';
                                        }}
                                        onMouseLeave={(e) => {
                                            e.currentTarget.style.transform = 'scale(1)';
                                            e.currentTarget.style.backgroundColor = '#4ecdc4';
                                        }}
                                    >
                                        No
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TheatreCanvas />);
    </script>
</body>
</html>
