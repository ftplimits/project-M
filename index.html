            animation: none;

            50% { transform: translateY(-50%) translateY(-20px) scale(1); }

        .avatar.talking {
            transform: translateY(-15px) scale(1.15);
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            transition: transform 200ms ease-out, filter 200ms ease-out;

        /* When DM avatar is both floating and talking, stay elevated */
        .avatar.floating.talking {

        .avatar.talking img {

        .avatar.flipped img {

            transform-origin: center;

        ::-webkit-scrollbar {

        }
        ::-webkit-scrollbar-thumb {

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Constants
        const DEFAULT_HOST_NAME = 'Host';
        const AUTO_FADE_DURATION = 3000; // 3 seconds
        const MESSAGE_DELIVERY_DELAY = 500; // 500ms for message delivery before disconnect

        const throttle = (func, limit) => {
    let inThrottle;
    return function(...args) {
        if (!inThrottle) {
            func.apply(this, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
};

        // Canvas roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                if (width < 2 * radius) radius = width / 2;
                if (height < 2 * radius) radius = height / 2;
                this.beginPath();
                this.moveTo(x + radius, y);
                this.arcTo(x + width, y, x + width, y + height, radius);
                this.arcTo(x + width, y + height, x, y + height, radius);
                this.arcTo(x, y + height, x, y, radius);
                this.arcTo(x, y, x + width, y, radius);
                this.closePath();
                return this;
            };
        }

        // Image downscaling utility function
        const downscaleImage = (file, maxWidth = 2048, maxHeight = 2048) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                
                reader.onerror = () => reject(new Error('Failed to read file'));
                
                reader.onload = (e) => {
                    img.onerror = () => reject(new Error('Failed to load image'));
                    
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        // Calculate new dimensions (preserve aspect ratio)
                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                            
                            console.log(`Downscaling image from ${img.width}x${img.height} to ${width}x${height} for performance`);
                        } else {
                            console.log(`Image ${img.width}x${img.height} is within limits, no downscaling needed`);
                        }
                        
                        // Create canvas and resize
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // Use better image smoothing (imageSmoothingQuality may not be supported in older browsers)
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // Draw resized image
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Preserve PNG format for transparency, use JPEG for compression
                        const isPNG = file.type === 'image/png';
                        const format = isPNG ? 'image/png' : 'image/jpeg';
                        const quality = isPNG ? 1.0 : 0.9; // PNG = lossless, JPEG = 90%
                        
                        console.log(`Saving as ${format} with quality ${quality}`);
                        
                        const dataUrl = canvas.toDataURL(format, quality);
                        resolve(dataUrl);
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.readAsDataURL(file);
            });
        };      
      
        const downscaleToken = (file) => {
            return downscaleImage(file, 256, 256);
        };

        // Grid map downscaling with custom quality
        const downscaleImageWithQuality = (file, maxWidth, maxHeight, quality) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                
                reader.onerror = () => reject(new Error('Failed to read file'));
                
                reader.onload = (e) => {
                    img.onerror = () => reject(new Error('Failed to load image'));
                    
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        // Calculate new dimensions (preserve aspect ratio)
                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                            
                            console.log(`Downscaling grid map from ${img.width}x${img.height} to ${width}x${height} at ${quality * 100}% quality for performance`);
                        } else {
                            console.log(`Grid map ${img.width}x${img.height} is within limits, no downscaling needed`);
                        }
                        
                        // Create canvas and resize
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // Use better image smoothing
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // Draw resized image
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Use JPEG for grid maps (better compression)
                        const format = 'image/jpeg';
                        
                        console.log(`Saving grid map as ${format} with quality ${quality}`);
                        
                        const dataUrl = canvas.toDataURL(format, quality);
                        resolve(dataUrl);
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.readAsDataURL(file);
            });
        };

        const TheatreCanvas = () => {
            // MULTIPLAYER STATE

            const connectionsRef = useRef([]);

            const [clipboardNotification, setClipboardNotification] = useState(false);
            const playersRef = useRef([]);
            const tokensRef = useRef([]);
            const draggedTokenRef = useRef(null); // Track which token we're actively dragging
            const processingReceivedMoveRef = useRef(false); // Track when processing move from another player
            const diceNotificationTimeoutRef = useRef(null);
            const clipboardNotificationTimeoutRef = useRef(null);
            const throttledTokenBroadcast = useRef(null);
            const throttledHostTokenBroadcast = useRef(null);
            const isHostRef = useRef(false);
            const isConnectedRef = useRef(false);
            const myPeerIdRef = useRef('');
            
            // NEW ADMISSION SYSTEM STATE

            const [showAdmitDialog, setShowAdmitDialog] = useState(false);

            const [kickConfirmation, setKickConfirmation] = useState(null); // { playerId, playerName }

            // HP Counter and Grid customization state

            const [zonesMode, setZonesMode] = useState(false);
            const [gridContextMenu, setGridContextMenu] = useState(null);

            // EXISTING STATE
            const [scenes, setScenes] = useState(
                Array.from({ length: 12 }, (_, i) => ({

            // Voice detection states

            const [avatarContextMenu, setAvatarContextMenu] = useState(null); // { x, y, avatarId }
            const [dmAvatarContextMenu, setDmAvatarContextMenu] = useState(null); // { x, y }
            const [micSensitivity, setMicSensitivity] = useState(0.10); // Default sensitivity (10%)

            const [vadCalibrated, setVadCalibrated] = useState(false); // Whether VAD has been calibrated

                    if (!newPeer.open) {
                        console.error('Peer connection timeout after 45 seconds');
                        newPeer.destroy();
                        alert('Connection timed out.\n\nThis could be due to:\n• Firewall blocking WebRTC\n• Network issues\n• PeerJS server overload\n\nPlease try again in a moment.');
                    }
                }, 45000); // 45 second timeout
                
                newPeer.on('open', (id) => {
                    clearTimeout(connectionTimeout);
                    console.log('Host peer opened with ID:', id);
                    setMyPeerId(id);
                    setRoomCode(id);
                    setIsHost(true);
                    setIsConnected(true);
                    setPlayers([{ id: id, name: name, isHost: true }]);
                    setPeer(newPeer);
                    
                    // Automatically copy shareable link to clipboard
                    const shareableLink = `${window.location.origin}${window.location.pathname}?room=${id}`;
                    copyToClipboard(shareableLink)
                        .then((success) => {
                            if (success) {
                                console.log('Shareable link copied to clipboard:', shareableLink);
                                
                                // Show clipboard notification
                                if (clipboardNotificationTimeoutRef.current) {
                                    clearTimeout(clipboardNotificationTimeoutRef.current);
                                }
                                
                                setClipboardNotification(true);
                                
                                clipboardNotificationTimeoutRef.current = setTimeout(() => {
                                    setClipboardNotification(false);
                                    clipboardNotificationTimeoutRef.current = null;
                                }, 3000);
                            } else {
                                console.warn('Could not copy shareable link to clipboard');
                            }
                        });
                    
                    // Give React a moment to update state, then close modal
                    setTimeout(() => {
                        setShowMultiplayerMenu(false);
                    }, 100);
                });

                newPeer.on('connection', (conn) => {
                    console.log('New player connecting:', conn.peer);
                    
                    conn.on('open', () => {
                        connectionsRef.current.push(conn);
                        setConnections([...connectionsRef.current]);
                        
                        // Send full state to new player (with locked images only)
                        conn.send({
                            type: 'FULL_STATE',
                            data: {
                                scenes: filterScenesForPlayers(scenes),
                                avatars,
                                tokens,
                                drawings,
                                fogShapes,
                                activeSceneIndex,
                                gridTransform,
                                gridColor,
                                zonesMode,
                                characterSheets,
                                diceModifiers,
                                dmAvatar,
                                players: playersRef.current
                            }
                        });
                    });

                    conn.on('data', (message) => {
                        handleIncomingMessage(message, conn);
                    });

                    conn.on('close', () => {
                        console.log('Player disconnected:', conn.peer);
                        connectionsRef.current = connectionsRef.current.filter(c => c.peer !== conn.peer);
                        setConnections([...connectionsRef.current]);
                        setPlayers(prev => {
                            const updated = prev.filter(p => p.id !== conn.peer);
                            broadcastState('PLAYER_LIST', updated);
                            return updated;
                        });
                    });
                });

                newPeer.on('error', (err) => {
                    clearTimeout(connectionTimeout);
                    console.error('Peer error:', err);
                    
                    let errorMessage = 'Connection error';
                    if (err.type === 'peer-unavailable') {
                        errorMessage = 'Room not found. The room may have closed.';
                    } else if (err.type === 'network') {
                        errorMessage = 'Network error. Please check your internet connection.';
                    } else if (err.type === 'server-error') {
                        errorMessage = 'PeerJS server error. Please try again in a moment.';
                    } else if (err.type === 'socket-error') {
                        errorMessage = 'Socket connection failed. Check firewall settings.';
                    } else if (err.type === 'unavailable-id') {
                        errorMessage = 'ID unavailable. Please try creating a new session.';
                    } else {
                        errorMessage = `${err.type}: ${err.message || 'Unknown error'}`;
                    }
                    
                    alert(`${errorMessage}\n\nTroubleshooting:\n• Check internet connection\n• Disable VPN if active\n• Check firewall/antivirus settings\n• Try a different browser`);
                });
            };

            const joinRoom = () => {
                if (!joinCode.trim()) {
                    alert('Please enter a room code!');
                    return;
                }

                const name = prompt('Enter your name:', playerName) || playerName;
                setPlayerName(name);
                
                const newPeer = new Peer({
                    debug: 2,
                    config: {
                        iceServers: [
                            // Google STUN servers
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun2.l.google.com:19302' },
                            { urls: 'stun:stun3.l.google.com:19302' },
                            { urls: 'stun:stun4.l.google.com:19302' },
                            // Cloudflare STUN
                            { urls: 'stun:stun.cloudflare.com:3478' },
                            // Open TURN servers for better NAT traversal
                            {
                                urls: 'turn:openrelay.metered.ca:80',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            }
                        ],
                        iceTransportPolicy: 'all',
                        iceCandidatePoolSize: 10,
                        bundlePolicy: 'max-bundle',
                        rtcpMuxPolicy: 'require'
                    }
                });
                
                // Extended connection timeout - 45 seconds for reliability
                const connectionTimeout = setTimeout(() => {
                    if (!newPeer.open) {
                        console.error('Peer connection timeout after 45 seconds');
                        newPeer.destroy();
                        alert('Connection timed out.\n\nThis could be due to:\n• Firewall blocking WebRTC\n• Network issues\n• PeerJS server overload\n\nPlease try again in a moment.');
                    }
                }, 45000); // 45 second timeout
                
                newPeer.on('open', (id) => {
                    clearTimeout(connectionTimeout);
                    setMyPeerId(id);
                    setPeer(newPeer);
                    
                    const conn = newPeer.connect(joinCode.trim());
                    
                    conn.on('open', () => {
                        console.log('Connected to host!');
                        connectionsRef.current.push(conn);
                        setConnections([...connectionsRef.current]);
                        setIsConnected(true);
                        setIsHost(false);
                        setRoomCode(joinCode.trim());
                        
                        console.log('Sending PLAYER_JOIN with id:', id, 'name:', name);
                        
                        // Send player info to host
                        conn.send({
                            type: 'PLAYER_JOIN',
                            data: { id: id, name: name, isHost: false }
                        });
                    });

                    conn.on('data', (message) => {
                        handleIncomingMessage(message, conn);
                    });

                    conn.on('close', () => {
                        console.log('Disconnected from host');
                        setIsConnected(false);
                        alert('Disconnected from host!');
                    });

                    conn.on('error', (err) => {
                        console.error('Connection error:', err);
                        alert('Failed to connect to room. Check the room code!');
                    });
                });
            };

            const handleIncomingMessage = (message, conn) => {
                if (!message || !message.type) return;

                switch (message.type) {
                    case 'FULL_STATE':
                        // Receive full state from host
                        console.log('Received FULL_STATE, players:', message.data.players);
                        setScenes(message.data.scenes || scenes);
                        setAvatars(message.data.avatars || []);
                        setTokens(message.data.tokens || []);
                        setDrawings(message.data.drawings || []);
                        setFogShapes(message.data.fogShapes || []);
                        setActiveSceneIndex(message.data.activeSceneIndex || 0);
                        setGridTransform(message.data.gridTransform || { zoom: 1, panX: 0, panY: 0 });
                        if (message.data.gridColor) setGridColor(message.data.gridColor);
                        if (message.data.zonesMode !== undefined) setZonesMode(message.data.zonesMode);
                        setCharacterSheets(message.data.characterSheets || []);
                        setDiceModifiers(message.data.diceModifiers || {});
                        setDmAvatar(message.data.dmAvatar || null);
                        setPlayers(message.data.players || []);
                        break;

                    case 'PLAYER_JOIN':
                        console.log('Checking if host... isHostRef.current:', isHostRef.current);
                        if (isHostRef.current) {
                            console.log('Host received PLAYER_JOIN:', message.data);
                            const newPlayer = message.data;
                            setPlayers(prev => {
                                if (prev.find(p => p.id === newPlayer.id)) return prev;
                                const updated = [...prev, newPlayer];
                                
                                console.log('Updated players list:', updated);
                                
                                // Broadcast updated player list to all players
                                broadcastState('PLAYER_LIST', updated);
                                
                                // Also send updated FULL_STATE to the new player to ensure they have everything
                                conn.send({
                                    type: 'FULL_STATE',
                                    data: {
                                        scenes: filterScenesForPlayers(scenes),
                                        avatars,
                                        tokens,
                                        drawings,
                                        fogShapes,
                                        activeSceneIndex,
                                        gridTransform,
                                        gridColor,
                                        zonesMode,
                                        characterSheets,
                                        diceModifiers,
                                        dmAvatar,
                                        players: updated
                                    }
                                });
                                
                                return updated;
                            });
                        } else {
                            console.log('Not host, ignoring PLAYER_JOIN');
                        }
                        break;

                    case 'PLAYER_LIST':
                        console.log('Received PLAYER_LIST:', message.data);
                        setPlayers(message.data);
                        break;

                    case 'TOKEN_UPDATE':
                        // JITTER FIX: Only update tokens we're not actively dragging
                        if (draggedTokenRef.current) {
                            // Merge incoming tokens with our current dragging token
                            setTokens(prevTokens => {
                                return message.data.map(incomingToken => {
                                    // If this is the token we're dragging, keep our local position
                                    if (incomingToken.id === draggedTokenRef.current) {
                                        const localToken = prevTokens.find(t => t.id === incomingToken.id);
                                        return localToken || incomingToken;
                                    }
                                    // For all other tokens, use the network position
                                    return incomingToken;
                                });
                            });
                        } else {
                            // Not dragging anything, accept all updates
                            setTokens(message.data);
                        }
                        
                        // REMOVED: Duplicate broadcast - useEffect handles broadcasting when tokens change
                        // The setTokens above triggers the useEffect which will broadcast to other players
                        break;

                    case 'TOKEN_MOVE':
                        // Update only the specific token that moved (more efficient than TOKEN_UPDATE)
                        const movedToken = message.data;
                        
                        // Don't update if we're currently dragging this token
                        if (draggedTokenRef.current === movedToken.id) {
                            break;
                        }
                        
                        // Set flag to prevent echo broadcast
                        processingReceivedMoveRef.current = true;
                        
                        setTokens(prev => prev.map(t => 
                            t.id === movedToken.id 
                                ? { ...t, x: movedToken.x, y: movedToken.y }
                                : t
                        ));
                        tokensRef.current = tokensRef.current.map(t =>
                            t.id === movedToken.id
                                ? { ...t, x: movedToken.x, y: movedToken.y }
                                : t
                        );
                        
                        // Clear flag after state update
                        setTimeout(() => {
                            processingReceivedMoveRef.current = false;
                        }, 50);
                        
                        // If host, relay to all OTHER players (not sender)
                        if (isHostRef.current) {
                            connectionsRef.current.forEach(c => {
                                if (c.peer !== conn.peer && c.open) {
                                    c.send({
                                        type: 'TOKEN_MOVE',
                                        data: movedToken
                                    });
                                }
                            });
                        }
                        break;

                    case 'DRAWING_UPDATE':
                        setDrawings(message.data);
                        break;

                    case 'FOG_UPDATE':
                        setFogShapes(message.data);
                        break;

                    case 'INITIATIVE_UPDATE':
                        // Receive initiative state from host
                        setInitiativeOrder(message.data.initiativeOrder);
                        setInitiativeValues(message.data.initiativeValues);
                        setCurrentTurnIndex(message.data.currentTurnIndex);
                        break;

                    case 'POINTER_UPDATE':
                        // Update active pointers with remote player's pointer
                        // Store world coordinates and convert to screen coordinates for this player's viewport
                        if (message.data.active) {
                            // Store world coordinates
                            setRemotePointerWorldCoords(prev => ({
                                ...prev,
                                [message.data.playerName]: {
                                    worldX: message.data.worldX,
                                    worldY: message.data.worldY
                                }
                            }));
                            
                            // Convert from world coordinates to screen coordinates
                            const screenX = message.data.worldX * gridTransformRef.current.zoom + gridTransformRef.current.panX;
                            const screenY = message.data.worldY * gridTransformRef.current.zoom + gridTransformRef.current.panY + GRID_OFFSET_Y;
                            
                            setActivePointers(prev => ({
                                ...prev,
                                [message.data.playerName]: {
                                    x: screenX,
                                    y: screenY
                                }
                            }));
                        } else {
                            // Remove pointer
                            setRemotePointerWorldCoords(prev => {
                                const updated = { ...prev };
                                delete updated[message.data.playerName];
                                return updated;
                            });
                            setActivePointers(prev => {
                                const updated = { ...prev };
                                delete updated[message.data.playerName];
                                return updated;
                            });
                        }
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('POINTER_UPDATE', message.data);
                        }
                        break;

                    case 'DICE_ROLL':
                        console.log('Received DICE_ROLL:', message.data);
                        addDiceRoll(message.data);
                        setSpinningDie(message.data.type);
                        setTimeout(() => setSpinningDie(null), 500);
                        
                        // Show dice notification for remote rolls
                        const rollData = message.data;
                        const formula = rollData.presetName || 
                            `${rollData.count}${rollData.type}${rollData.modifier !== 0 ? (rollData.modifier > 0 ? '+' + rollData.modifier : rollData.modifier) : ''}`;
                        
                        console.log('Setting dice notification:', { playerName: rollData.playerName, formula, result: rollData.total });
                        
                        // Clear any existing timeout
                        if (diceNotificationTimeoutRef.current) {
                            clearTimeout(diceNotificationTimeoutRef.current);
                        }
                        
                        setDiceNotification({
                            playerName: rollData.playerName,
                            formula: formula,
                            result: rollData.total
                        });
                        
                        diceNotificationTimeoutRef.current = setTimeout(() => {
                            setDiceNotification(null);
                            diceNotificationTimeoutRef.current = null;
                        }, 3000);
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            console.log('Host re-broadcasting DICE_ROLL to other players');
                            broadcastState('DICE_ROLL', rollData);
                        }
                        break;

                    case 'SCENE_CHANGE':
                        setActiveSceneIndex(message.data);
                        break;

                    case 'AVATAR_UPDATE':
                        setAvatars(message.data);
                        break;

                    case 'GRID_TRANSFORM':
                        setGridTransform(message.data);
                        break;

                    case 'GRID_COLOR_UPDATE':
                        setGridColor(message.data);
                        break;

                    case 'ZONES_MODE_UPDATE':
                        setZonesMode(message.data);
                        break;

                    case 'SPOTLIGHT_UPDATE':
                        setSpotlightedAvatarId(message.data);
                        break;

                    case 'SCENE_IMAGE_UPDATE':
                        setScenes(message.data);
                        break;

                    case 'CHARACTER_SHEETS_UPDATE':
                        setCharacterSheets(message.data);
                        break;
                    
                    case 'HANDOUT_SHOW':
                        // Display handout for all players
                        setHandoutImage(message.data.src);
                        setHandoutVisible(true);
                        break;
                    
                    case 'DM_AVATAR_UPDATE':
                        // Update DM avatar for all players (position, lock, name, etc)
                        setDmAvatar(message.data);
                        
                        // If assigned to us, request mic permission
                        if (message.data.assignedPlayerId === myPeerIdRef.current && !micEnabled) {
                            requestMicPermission();
                        }
                        
                        // If this is our avatar, update our monitoring sensitivity
                        if (message.data.assignedPlayerId === myPeerIdRef.current && message.data.micSensitivity) {
                            console.log(`Player received DM avatar sensitivity update: ${(message.data.micSensitivity * 100).toFixed(1)}%`);
                            setMicSensitivity(message.data.micSensitivity);
                            micSensitivityRef.current = message.data.micSensitivity; // Update ref
                        }
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('DM_AVATAR_UPDATE', message.data);
                        }
                        break;
                    
                    case 'DM_AVATAR_REMOVE':
                        // Remove DM avatar for all players
                        setDmAvatar(null);
                        break;
                    
                    case 'AVATAR_BOUNCE':
                        // Trigger bounce animation for all players
                        const { avatarId } = message.data;
                        setBouncingAvatarIds(prev => {
                            if (prev.includes(avatarId)) return prev;
                            return [...prev, avatarId];
                        });
                        setTimeout(() => {
                            setBouncingAvatarIds(prev => prev.filter(id => id !== avatarId));
                        }, 500);
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('AVATAR_BOUNCE', message.data);
                        }
                        break;
                    
                    case 'AVATAR_ASSIGNMENT':
                        // Update avatar player assignment for all players
                        setAvatars(prev => prev.map(av => 
                            av.id === message.data.avatarId 
                                ? { ...av, assignedPlayerId: message.data.playerId } 
                                : av
                        ));
                        
                        // If assigned to us, request mic permission
                        if (message.data.playerId === myPeerIdRef.current) {
                            requestMicPermission();
                        }
                        break;
                    
                    case 'AVATAR_SENSITIVITY':
                        // Update avatar sensitivity for all players
                        setAvatars(prev => {
                            const updated = prev.map(av => 
                                av.id === message.data.avatarId 
                                    ? { ...av, micSensitivity: message.data.sensitivity } 
                                    : av
                            );
                            
                            // Check if this is our avatar and update monitoring immediately
                            const myAvatar = updated.find(av => av.id === message.data.avatarId);
                            if (myAvatar && myAvatar.assignedPlayerId === myPeerIdRef.current) {
                                console.log(`Player received sensitivity update: ${(message.data.sensitivity * 100).toFixed(1)}%`);
                                setMicSensitivity(message.data.sensitivity);
                                micSensitivityRef.current = message.data.sensitivity;
                            }
                            
                            return updated;
                        });
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('AVATAR_SENSITIVITY', message.data);
                        }
                        break;
                    
                    case 'TOKEN_PLAYER_ASSIGNMENT':
                        // Update token player assignment for all players
                        setTokens(prev => prev.map(token => 
                            token.id === message.data.tokenId 
                                ? { ...token, assignedPlayerId: message.data.playerId } 
                                : token
                        ));
                        break;
                    
                    case 'PLAYER_TALKING_START':
                        // Mark player as talking
                        setTalkingPlayers(prev => new Set([...prev, message.data.playerId]));
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('PLAYER_TALKING_START', message.data);
                        }
                        break;
                    
                    case 'PLAYER_TALKING_STOP':
                        // Mark player as not talking
                        setTalkingPlayers(prev => {
                            const newSet = new Set(prev);
                            newSet.delete(message.data.playerId);
                            return newSet;
                        });
                        
                        // If host, re-broadcast to all other players
                        if (isHostRef.current) {
                            broadcastState('PLAYER_TALKING_STOP', message.data);
                        }
                        break;
                    
                    case 'JOIN_REQUEST':
                        // Host receives join request from player
                        if (isHostRef.current) {
                            console.log('Host received JOIN_REQUEST:', message.data);
                            const { name, peerId } = message.data;
                            
                            // Add to pending requests queue
                            setPendingJoinRequests(prev => {
                                const newRequests = [...prev, { name, peerId, conn }];
                                
                                // If this is the first request, show dialog immediately
                                if (prev.length === 0) {
                                    setCurrentJoinRequest({ name, peerId, conn });
                                    setShowAdmitDialog(true);
                                }
                                
                                return newRequests;
                            });
                        }
                        break;
                    
                    case 'JOIN_APPROVED':
                        // Player receives approval from host
                        console.log('Player received JOIN_APPROVED');
                        setShowWaitingDialog(false);
                        setIsConnected(true);
                        // Connection is now established, will receive FULL_STATE next
                        break;
                    
                    case 'JOIN_DENIED':
                        // Player receives denial from host
                        console.log('Player received JOIN_DENIED');
                        setShowWaitingDialog(false);
                        setDeniedMessage(true);
                        
                        // Auto-close after configured duration and disconnect
                        setTimeout(() => {
                            setDeniedMessage(false);
                            if (peer) {
                                peer.destroy();
                            }
                            setPeer(null);
                            setIsConnected(false);
                            // Clean up URL parameter
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }, AUTO_FADE_DURATION);
                        break;
                    
                    case 'PLAYER_KICKED':
                        // Player was kicked by host
                        console.log('You were kicked from the session');
                        
                        // Show notification modal
                        setKickedMessage(true);
                        
                        // Disconnect immediately
                        if (peer) {
                            peer.destroy();
                        }
                        
                        // Reset state
                        connectionsRef.current = [];
                        setConnections([]);
                        setIsConnected(false);
                        setIsHost(false);
                        setPlayers([]);
                        setRoomCode('');
                        setPeer(null);
                        
                        // Auto-close message after configured duration
                        setTimeout(() => {
                            setKickedMessage(false);
                        }, AUTO_FADE_DURATION);
                        break;

                    default:
                        console.log('Unknown message type:', message.type);
                }
            };

            const admitPlayer = () => {
                if (!currentJoinRequest) return;
                
                const { name, peerId, conn } = currentJoinRequest;
                console.log('Admitting player:', name, peerId);
                
                // Send JOIN_APPROVED to player
                conn.send({
                    type: 'JOIN_APPROVED',
                    data: { approved: true }
                });
                
                // Add player to players list and prepare updated list
                const newPlayer = { id: peerId, name: name, isHost: false };
                let updatedPlayers;
                
                setPlayers(prev => {
                    if (prev.find(p => p.id === peerId)) return prev;
                    updatedPlayers = [...prev, newPlayer];
                    return updatedPlayers;
                });
                
                // Send state after player list is updated
                // Use setTimeout to ensure state update has completed
                setTimeout(() => {
                    // Broadcast updated player list to all players
                    broadcastState('PLAYER_LIST', playersRef.current);
                    
                    // Send FULL_STATE to newly admitted player with current game state
                    conn.send({
                        type: 'FULL_STATE',
                        data: {
                            scenes: filterScenesForPlayers(scenes),
                            avatars,
                            tokens,
                            drawings,
                            fogShapes,
                            activeSceneIndex,
                            gridTransform,
                            gridColor,
                            zonesMode,
                            characterSheets,
                            diceModifiers,
                            dmAvatar,
                            players: playersRef.current
                        }
                    });
                }, 0);
                
                // Remove from pending requests
                setPendingJoinRequests(prev => {
                    const updated = prev.filter(req => req.peerId !== peerId);
                    
                    // Show next request if any
                    if (updated.length > 0) {
                        setCurrentJoinRequest(updated[0]);
                        setShowAdmitDialog(true);
                    } else {
                        setCurrentJoinRequest(null);
                        setShowAdmitDialog(false);
                    }
                    
                    return updated;
                });
            };
            
            const denyPlayer = () => {
                if (!currentJoinRequest) return;
                
                const { name, peerId, conn } = currentJoinRequest;
                console.log('Denying player:', name, peerId);
                
                // Send JOIN_DENIED to player
                conn.send({
                    type: 'JOIN_DENIED',
                    data: { approved: false }
                });
                
                // Close connection after ensuring message is delivered
                setTimeout(() => {
                    conn.close();
                }, MESSAGE_DELIVERY_DELAY);
                
                // Remove from pending requests
                setPendingJoinRequests(prev => {
                    const updated = prev.filter(req => req.peerId !== peerId);
                    
                    // Show next request if any
                    if (updated.length > 0) {
                        setCurrentJoinRequest(updated[0]);
                        setShowAdmitDialog(true);
                    } else {
                        setCurrentJoinRequest(null);
                        setShowAdmitDialog(false);
                    }
                    
                    return updated;
                });
            };

            const disconnectFromRoom = () => {
                if (peer) {
                    peer.destroy();
                }
                connectionsRef.current = [];
                setConnections([]);
                setIsConnected(false);
                setIsHost(false);
                setPlayers([]);
                setRoomCode('');
                setPeer(null);
            };

            const kickPlayer = (playerId, playerName) => {
                if (!isHost) return;
                
                // Find the connection for this player
                const playerConnection = connectionsRef.current.find(conn => conn.peer === playerId);
                
                if (playerConnection && playerConnection.open) {
                    // Send kick message
                    playerConnection.send({
                        type: 'PLAYER_KICKED',
                        data: { reason: 'kicked by host' }
                    });
                    
                    // Close connection
                    playerConnection.close();
                }
                
                // Remove from connections
                connectionsRef.current = connectionsRef.current.filter(c => c.peer !== playerId);
                setConnections([...connectionsRef.current]);
                
                // Remove from players list
                setPlayers(prev => {
                    const updated = prev.filter(p => p.id !== playerId);
                    broadcastState('PLAYER_LIST', updated);
                    return updated;
                });
                
                console.log(`Kicked player: ${playerName} (${playerId})`);
            };

                        remainingAvatarsRef.current.splice(randomIndex, 1);

            const parseDiceFormula = (formula) => {
                // Remove all spaces for easier parsing
                formula = formula.replace(/\s+/g, '');
                
                // Pattern for individual dice groups: XdY, XdYkhZ, XdYklZ
                // Supports: 2d20, 2d20kh1 (keep highest), 2d20kl1 (keep lowest)
                const dicePattern = /(\d+)d(\d+)(?:kh(\d+)|kl(\d+))?/gi;
                
                // Pattern for modifiers: +5, -3
                const modifierPattern = /([+-]\d+)/g;
                
                const diceGroups = [];
                let match;
                
                // Extract all dice groups
                while ((match = dicePattern.exec(formula)) !== null) {
                    const count = parseInt(match[1]);
                    const sides = parseInt(match[2]);
                    const keepHighest = match[3] ? parseInt(match[3]) : null;
                    const keepLowest = match[4] ? parseInt(match[4]) : null;
                    
                    // Validation
                    if (keepHighest && keepHighest > count) return null;
                    if (keepLowest && keepLowest > count) return null;
                    
                    diceGroups.push({
                        count,
                        sides,
                        keepHighest,
                        keepLowest
                    });
                }
                
                // Extract modifier (sum all modifiers found)
                let modifier = 0;
                while ((match = modifierPattern.exec(formula)) !== null) {
                    modifier += parseInt(match[1]);
                }
                
                // Must have at least one dice group to be valid
                if (diceGroups.length === 0) return null;
                
                return {
                    diceGroups,
                    modifier
                };
            };

            const rollDiceFormula = (formula, presetName, presetId = null) => {
                const parsed = parseDiceFormula(formula);
                if (!parsed) {
                    alert('Invalid dice formula');
                    return;
                }
                
                const { diceGroups, modifier } = parsed;
                const groupResults = [];
                let grandTotal = 0;
                
                // Roll each dice group
                diceGroups.forEach(group => {
                    const { count, sides, keepHighest, keepLowest } = group;
                    const rolls = [];
                    
                    // Roll all dice in this group
                    for (let i = 0; i < count; i++) {
                        rolls.push(Math.floor(Math.random() * sides) + 1);
                    }
                    
                    // Sort rolls for keep highest/lowest
                    const sortedRolls = [...rolls].sort((a, b) => b - a);
                    let keptRolls = rolls;
                    let droppedRolls = [];
                    
                    // Apply keep highest/lowest
                    if (keepHighest) {
                        keptRolls = sortedRolls.slice(0, keepHighest);
                        droppedRolls = sortedRolls.slice(keepHighest);
                    } else if (keepLowest) {
                        keptRolls = sortedRolls.slice(-keepLowest);
                        droppedRolls = sortedRolls.slice(0, -keepLowest);
                    }
                    
                    const groupSum = keptRolls.reduce((a, b) => a + b, 0);
                    grandTotal += groupSum;
                    
                    groupResults.push({
                        sides,
                        count,
                        rolls,
                        keptRolls,
                        droppedRolls,
                        sum: groupSum,
                        keepHighest,
                        keepLowest
                    });
                });
                
                // Add modifier to grand total
                grandTotal += modifier;
                
                const rollData = {

                // Broadcast dice roll

                        });

                setSpinningDie(`d${firstGroup.sides}`);

                // Spin the preset button if presetId provided

const calculateSafeAvatarY = (yPosition, avatarWidth, viewportHeight) => {
    if (!viewportHeight) return yPosition; // Can't constrain without viewport height
    
    const avatarImageHeight = (avatarWidth || 180) * 1.25; // Avatar aspect ratio
    const labelHeight = 45; // Approximate height of name label
    const bottomMargin = 20; // Minimum margin from bottom border
    
    // Calculate maximum allowed Y (to keep label visible)
    const maxY = viewportHeight - avatarImageHeight - labelHeight - bottomMargin;
    
    // Constrain Y to safe range
    return Math.min(yPosition, Math.max(0, maxY));
};

                const vad = vadStateRef.current;
                
                // 1. ENERGY DETECTION
                const totalEnergy = frequencyData.reduce((sum, val) => sum + val, 0) / frequencyData.length / 255;
                
                // 2. SPECTRAL ANALYSIS - Energy in speech frequency bands
                // Human speech is typically 300-3400 Hz
                const binWidth = (audioContextRef.current.sampleRate / 2) / analyser.frequencyBinCount;
                
                const getLowBand = () => { // 300-1000 Hz
                    const start = Math.floor(300 / binWidth);
                    const end = Math.floor(1000 / binWidth);
                    let sum = 0;
                    for (let i = start; i < end && i < frequencyData.length; i++) {
                        sum += frequencyData[i];
                    }
                    return sum / (end - start) / 255;
                };
                
                const getMidBand = () => { // 1000-2000 Hz
                    const start = Math.floor(1000 / binWidth);
                    const end = Math.floor(2000 / binWidth);
                    let sum = 0;
                    for (let i = start; i < end && i < frequencyData.length; i++) {
                        sum += frequencyData[i];
                    }
                    return sum / (end - start) / 255;
                };
                
                const getHighBand = () => { // 2000-3400 Hz
                    const start = Math.floor(2000 / binWidth);
                    const end = Math.floor(3400 / binWidth);
                    let sum = 0;
                    for (let i = start; i < end && i < frequencyData.length; i++) {

                    }

                let zeroCrossings = 0;
                for (let i = 1; i < timeDomainData.length; i++) {

                    }
