        const throttle = (func, limit) => {
    let inThrottle;
    return function(...args) {
        if (!inThrottle) {
            func.apply(this, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
};

        // Image downscaling utility function
        const downscaleImage = (file, maxWidth = 2048, maxHeight = 2048) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                
                reader.onerror = () => reject(new Error('Failed to read file'));
                
                reader.onload = (e) => {
                    img.onerror = () => reject(new Error('Failed to load image'));
                    
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        // Calculate new dimensions (preserve aspect ratio)
                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                            
                            console.log(`Downscaling image from ${img.width}x${img.height} to ${width}x${height} for performance`);
                        } else {
                            console.log(`Image ${img.width}x${img.height} is within limits, no downscaling needed`);
                        }
                        
                        // Create canvas and resize
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // Use better image smoothing (imageSmoothingQuality may not be supported in older browsers)
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // Draw resized image
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Preserve PNG format for transparency, use JPEG for compression
                        const isPNG = file.type === 'image/png';
                        const format = isPNG ? 'image/png' : 'image/jpeg';
                        const quality = isPNG ? 1.0 : 0.9; // PNG = lossless, JPEG = 90%
                        
                        console.log(`Saving as ${format} with quality ${quality}`);
                        
                        const dataUrl = canvas.toDataURL(format, quality);
                        resolve(dataUrl);
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.readAsDataURL(file);
            });
        };

        // Token-specific downscaling function (512x512 instead of 2048x2048)
        // Tokens are displayed at 50-100px on screen, so 512x512 is more than enough
        const downscaleToken = (file) => {
            return downscaleImage(file, 512, 512);

        // Grid map downscaling with custom quality

            return new Promise((resolve, reject) => {

                reader.onerror = () => reject(new Error('Failed to read file'));
                
                reader.onload = (e) => {

                        // Calculate new dimensions (preserve aspect ratio)

                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);

                        } else {

                        }
                        
                        // Create canvas and resize
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // Use better image smoothing
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // Draw resized image
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Use JPEG for grid maps (better compression)
                        const format = 'image/jpeg';
                        
                        console.log(`Saving grid map as ${format} with quality ${quality}`);
                        
                        const dataUrl = canvas.toDataURL(format, quality);
                        resolve(dataUrl);
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.readAsDataURL(file);
            });
        };

            // Performance optimization constants

            // Auto-save timeout ref

            // Auto-save function (saves to localStorage silently)
            const autoSave = () => {
                try {
                    const payload = {
                        scenes,
                        avatars,
                        tokens,
                        drawings,
                        activeSceneIndex,
                        gridTransform,
                        dicePresets,
                        characterSheets,
                        diceModifiers,

                    console.log('Auto-saved at', new Date().toLocaleTimeString());

                    console.error('Auto-save failed', err);
                }
            };

            // Debounced auto-save trigger
            const scheduleAutoSave = () => {
                if (autoSaveTimeoutRef.current) {
                    clearTimeout(autoSaveTimeoutRef.current);
                }
                autoSaveTimeoutRef.current = setTimeout(() => {
                    autoSave();
                }, AUTOSAVE_DELAY);

            // Auto-save whenever game state changes
            useEffect(() => {
                scheduleAutoSave();
            }, [scenes, avatars, tokens, drawings, activeSceneIndex, gridTransform, dicePresets, characterSheets, diceModifiers]);

            // Auto-load on startup

            useEffect(() => {

                    if (autoSaveTimeoutRef.current) {
                        clearTimeout(autoSaveTimeoutRef.current);

                    autoSave();

                        e.returnValue = message;

                window.addEventListener('beforeunload', handleBeforeUnload);

            const parseDiceFormula = (formula) => {
                // Remove all spaces for easier parsing
                formula = formula.replace(/\s+/g, '');
                
                // Pattern for individual dice groups: XdY, XdYkhZ, XdYklZ
                // Supports: 2d20, 2d20kh1 (keep highest), 2d20kl1 (keep lowest)
                const dicePattern = /(\d+)d(\d+)(?:kh(\d+)|kl(\d+))?/gi;
                
                // Pattern for modifiers: +5, -3
                const modifierPattern = /([+-]\d+)/g;
                
                const diceGroups = [];
                let match;
                
                // Extract all dice groups
                while ((match = dicePattern.exec(formula)) !== null) {
                    const count = parseInt(match[1]);
                    const sides = parseInt(match[2]);
                    const keepHighest = match[3] ? parseInt(match[3]) : null;
                    const keepLowest = match[4] ? parseInt(match[4]) : null;
                    
                    // Validation
                    if (keepHighest && keepHighest > count) return null;
                    if (keepLowest && keepLowest > count) return null;
                    
                    diceGroups.push({
                        count,
                        sides,
                        keepHighest,
                        keepLowest
                    });
                }
                
                // Extract modifier (sum all modifiers found)
                let modifier = 0;
                while ((match = modifierPattern.exec(formula)) !== null) {
                    modifier += parseInt(match[1]);
                }
                
                // Must have at least one dice group to be valid
                if (diceGroups.length === 0) return null;
                
                return {
                    diceGroups,
                    modifier
                };
            };

                const parsed = parseDiceFormula(formula);
                if (!parsed) {
                    alert('Invalid dice formula');
                    return;

                const { diceGroups, modifier } = parsed;
                const groupResults = [];
                let grandTotal = 0;
                
                // Roll each dice group
                diceGroups.forEach(group => {
                    const { count, sides, keepHighest, keepLowest } = group;
                    const rolls = [];
                    
                    // Roll all dice in this group
                    for (let i = 0; i < count; i++) {
                        rolls.push(Math.floor(Math.random() * sides) + 1);
                    }
                    
                    // Sort rolls for keep highest/lowest
                    const sortedRolls = [...rolls].sort((a, b) => b - a);
                    let keptRolls = rolls;
                    let droppedRolls = [];
                    
                    // Apply keep highest/lowest
                    if (keepHighest) {
                        keptRolls = sortedRolls.slice(0, keepHighest);
                        droppedRolls = sortedRolls.slice(keepHighest);
                    } else if (keepLowest) {
                        keptRolls = sortedRolls.slice(-keepLowest);
                        droppedRolls = sortedRolls.slice(0, -keepLowest);
                    }
                    
                    const groupSum = keptRolls.reduce((a, b) => a + b, 0);
                    grandTotal += groupSum;
                    
                    groupResults.push({
                        sides,
                        count,
                        rolls,
                        keptRolls,
                        droppedRolls,
                        sum: groupSum,
                        keepHighest,
                        keepLowest
                    });
                });
                
                // Add modifier to grand total
                grandTotal += modifier;
                
                const rollData = {

                        });

                // Spin the preset button if presetId provided

            };

// ADD THIS NEW FUNCTION FOR GRID IMAGE UPLOADS:
const handleGridImageUpload = async (e) => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    
    try {
        // Downscale grid maps for performance
        const downscaledDataUrl = await downscaleImageWithQuality(
            file, 
            GRID_MAP_MAX_WIDTH, 
            GRID_MAP_MAX_HEIGHT, 
            GRID_MAP_QUALITY
        );
        
        // Load the downscaled image to get dimensions
        const img = new Image();
        await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = () => reject(new Error('Failed to load downscaled image'));
            img.src = downscaledDataUrl;
        });
        
        // Place image at center of viewport in grid coordinates
        const centerClientX = window.innerWidth / 2;
        const centerClientY = window.innerHeight / 2;
        
        // Calculate initial size (proportional to grid)
        const initialWidth = 200 / gridTransform.zoom;
        const initialHeight = (initialWidth * img.height) / img.width;
        
        // Convert screen center to grid coordinates
        const gridCenterX = (centerClientX - gridTransform.panX) / gridTransform.zoom - initialWidth / 2;
        const gridCenterY = (centerClientY - GRID_OFFSET_Y - gridTransform.panY) / gridTransform.zoom - initialHeight / 2;
        
        const newImage = {
            id: Date.now(),
            src: downscaledDataUrl,
            x: gridCenterX,
            y: gridCenterY,
            width: initialWidth,
            height: initialHeight,
            locked: false,
            originalWidth: img.width,
            originalHeight: img.height,
            isGridImage: true // Mark this as a grid-placed image
        };
        
        setScenes(prev => prev.map((s, i) => {
            if (i !== activeSceneIndex) return s;
            return {
                ...s,
                images: [...(s.images || []), newImage]
            };
        }));

                                connectionsRef.current[0]?.send({
                                    type: 'POINTER_UPDATE',
                                    data: pointerData
                                });
                            }
                        }
                    }
                };

                const handleMouseMove = (e) => {
                    if (isPointerActive) {
                        setPointerPosition({ x: e.clientX, y: e.clientY });
                        
                        // Broadcast pointer movement
                        const pointerData = {
                            playerName: playerName,
                            x: e.clientX,
                            y: e.clientY,
                            active: true
                        };
                        
                        if (isConnectedRef.current) {
                            if (isHostRef.current) {
                                broadcastState('POINTER_UPDATE', pointerData);
                            } else {
                                connectionsRef.current[0]?.send({
                                    type: 'POINTER_UPDATE',
                                    data: pointerData
                                });
                            }
                        }
                    }
                };

                const handleMouseUp = (e) => {
                    // Middle mouse button (button 1)
                    if (e.button === 1) {
                        setIsPointerActive(false);
                        
                        // Broadcast pointer deactivation
                        const pointerData = {
                            playerName: playerName,
                            x: e.clientX,
                            y: e.clientY,
                            active: false
                        };
                        
                        if (isConnectedRef.current) {
                            if (isHostRef.current) {
                                broadcastState('POINTER_UPDATE', pointerData);
                            } else {
                                connectionsRef.current[0]?.send({
                                    type: 'POINTER_UPDATE',
                                    data: pointerData
                                });
                            }
                        }
                    }
                };

                document.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    document.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isPointerActive, playerName]);

            useEffect(() => {
                const canvas = drawCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                const worldToScreenX = wx => wx * gridTransform.zoom + gridTransform.panX;
                const worldToScreenY = wy => wy * gridTransform.zoom + gridTransform.panY;

                drawings.forEach(drawing => {
                    const baseWidth = 3;
                    const width = (drawing.width || 1) * baseWidth;
                    ctx.strokeStyle = drawing.color;
                    ctx.fillStyle = drawing.color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    if (drawing.tool === 'freehand') {
                        if (!drawing.points || drawing.points.length < 2) return;
                        ctx.beginPath();
                        const p0 = drawing.points[0];
                        ctx.moveTo(worldToScreenX(p0.x), worldToScreenY(p0.y));
                        drawing.points.forEach(point => ctx.lineTo(worldToScreenX(point.x), worldToScreenY(point.y)));
                        ctx.stroke();
                    } else if (drawing.tool === 'line') {
                        ctx.beginPath();
                        ctx.moveTo(worldToScreenX(drawing.startX), worldToScreenY(drawing.startY));
                        ctx.lineTo(worldToScreenX(drawing.endX), worldToScreenY(drawing.endY));
                        ctx.stroke();
                    } else if (drawing.tool === 'circle') {
                        const radius = Math.sqrt(
                            Math.pow(drawing.endX - drawing.startX, 2) +
                            Math.pow(drawing.endY - drawing.startY, 2)
                        );
                        const screenRadius = radius * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.arc(worldToScreenX(drawing.startX), worldToScreenY(drawing.startY), screenRadius, 0, 2 * Math.PI);
                        ctx.stroke();
                    } else if (drawing.tool === 'filled-circle') {
                        const radius = Math.sqrt(
                            Math.pow(drawing.endX - drawing.startX, 2) +
                            Math.pow(drawing.endY - drawing.startY, 2)
                        );
                        const screenRadius = radius * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.arc(worldToScreenX(drawing.startX), worldToScreenY(drawing.startY), screenRadius, 0, 2 * Math.PI);
                        ctx.fill();
                    } else if (drawing.tool === 'rectangle') {
                        const sx = worldToScreenX(drawing.startX);
                        const sy = worldToScreenY(drawing.startY);
                        const sw = (drawing.endX - drawing.startX) * gridTransform.zoom;
                        const sh = (drawing.endY - drawing.startY) * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.rect(sx, sy, sw, sh);
                        ctx.stroke();
                    } else if (drawing.tool === 'filled-rect') {
                        const sx = worldToScreenX(drawing.startX);
                        const sy = worldToScreenY(drawing.startY);
                        const sw = (drawing.endX - drawing.startX) * gridTransform.zoom;
                        const sh = (drawing.endY - drawing.startY) * gridTransform.zoom;
                        ctx.fillRect(sx, sy, sw, sh);
                    }
                });

                if (currentDrawing) {
                    const baseWidth = 3;
                    const width = (currentDrawing.width || 1) * baseWidth;
                    ctx.strokeStyle = currentDrawing.color;
                    ctx.fillStyle = currentDrawing.color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    if (currentDrawing.tool === 'freehand') {
                        if (!currentDrawing.points || currentDrawing.points.length < 2) return;
                        ctx.beginPath();
                        const p0 = currentDrawing.points[0];
                        ctx.moveTo(worldToScreenX(p0.x), worldToScreenY(p0.y));
                        currentDrawing.points.forEach(point => ctx.lineTo(worldToScreenX(point.x), worldToScreenY(point.y)));
                        ctx.stroke();
                    } else if (currentDrawing.tool === 'line') {
                        ctx.beginPath();
                        ctx.moveTo(worldToScreenX(currentDrawing.startX), worldToScreenY(currentDrawing.startY));
                        ctx.lineTo(worldToScreenX(currentDrawing.endX), worldToScreenY(currentDrawing.endY));
                        ctx.stroke();
                    } else if (currentDrawing.tool === 'circle') {
                        const radius = Math.sqrt(
                            Math.pow(currentDrawing.endX - currentDrawing.startX, 2) +
                            Math.pow(currentDrawing.endY - currentDrawing.startY, 2)
                        );
                        const screenRadius = radius * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.arc(worldToScreenX(currentDrawing.startX), worldToScreenY(currentDrawing.startY), screenRadius, 0, 2 * Math.PI);
                        ctx.stroke();
                    } else if (currentDrawing.tool === 'filled-circle') {
                        const radius = Math.sqrt(
                            Math.pow(currentDrawing.endX - currentDrawing.startX, 2) +
                            Math.pow(currentDrawing.endY - currentDrawing.startY, 2)
                        );
                        const screenRadius = radius * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.arc(worldToScreenX(currentDrawing.startX), worldToScreenY(currentDrawing.startY), screenRadius, 0, 2 * Math.PI);
                        ctx.fill();
                    } else if (currentDrawing.tool === 'rectangle') {
                        const sx = worldToScreenX(currentDrawing.startX);
                        const sy = worldToScreenY(currentDrawing.startY);
                        const sw = (currentDrawing.endX - currentDrawing.startX) * gridTransform.zoom;
                        const sh = (currentDrawing.endY - currentDrawing.startY) * gridTransform.zoom;
                        ctx.beginPath();
                        ctx.rect(sx, sy, sw, sh);
                        ctx.stroke();
                    } else if (currentDrawing.tool === 'filled-rect') {
                        const sx = worldToScreenX(currentDrawing.startX);
                        const sy = worldToScreenY(currentDrawing.startY);
                        const sw = (currentDrawing.endX - currentDrawing.startX) * gridTransform.zoom;
                        const sh = (currentDrawing.endY - currentDrawing.startY) * gridTransform.zoom;
                        ctx.fillRect(sx, sy, sw, sh);
                    }
                }

                // Draw measurement line for tokens being dragged with measurement enabled
                if (tokenDragStart && draggedToken === tokenDragStart.tokenId) {
                    const draggedTokenWithMeasurement = tokens.find(t => 
                        t.id === tokenDragStart.tokenId && t.showMeasurement
                    );
                    
                    if (draggedTokenWithMeasurement) {
                        // Convert world coordinates to screen coordinates
                        const startScreenX = worldToScreenX(tokenDragStart.startX);
                        const startScreenY = worldToScreenY(tokenDragStart.startY);
                        
                        const currentScreenX = worldToScreenX(draggedTokenWithMeasurement.x);
                        const currentScreenY = worldToScreenY(draggedTokenWithMeasurement.y);
                        
                        // Draw line
                        ctx.strokeStyle = '#d4af37'; // Amber
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(startScreenX, startScreenY);
                        ctx.lineTo(currentScreenX, currentScreenY);
                        ctx.stroke();
                        
                        // Calculate distance in grid squares
                        const deltaX = draggedTokenWithMeasurement.x - tokenDragStart.startX;
                        const deltaY = draggedTokenWithMeasurement.y - tokenDragStart.startY;
                        const distanceInPixels = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                        const gridSize = activeScene.grid?.size || 50;
                        const distanceInSquares = Math.round(distanceInPixels / gridSize * 10) / 10;
                        const distanceInFeet = Math.round(distanceInSquares * 5);
                        const label = `${distanceInFeet} ft`;                       
                        const midX = (startScreenX + currentScreenX) / 2;
                        const midY = (startScreenY + currentScreenY) / 2 - 20;
                        ctx.font = 'bold 14px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Background
                        const metrics = ctx.measureText(label);
                        const padding = 6;
                        ctx.fillStyle = '#27272a'; // zinc-800
                        ctx.fillRect(
                            midX - metrics.width / 2 - padding,
                            midY - 10,
                            metrics.width + padding * 2,
                            20
                        );
                        
                        // Text
                        ctx.fillStyle = '#d4af37'; // Amber
                        ctx.fillText(label, midX, midY);
                    }
                }
            }, [drawings, currentDrawing, activeScene.grid?.enabled, gridTransform, tokenDragStart, draggedToken, tokens]);

            // ==== MULTI-LAYER CANVAS RENDERING ====
            
            // Layer 1: Map Canvas - renders static map images (redraws only on map change)
            useEffect(() => {
                const canvas = mapCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                
                // Render grid images (map backgrounds) with caching
                const gridImages = (activeScene.images || []).filter(img => img.isGridImage);
                
                if (gridImages.length === 0) return;
                
                // Load and render images using cache
                const renderImages = async () => {
                    ctx.clearRect(0, 0, width, height);
                    
                    for (const image of gridImages) {
                        const displayX = image.x * gridTransform.zoom + gridTransform.panX;
                        const displayY = image.y * gridTransform.zoom + gridTransform.panY;
                        const displayWidth = image.width * gridTransform.zoom;
                        const displayHeight = image.height * gridTransform.zoom;
                        
                        // Check cache first
                        let img = imageCache.current.get(image.src);
                        if (!img) {
                            img = new Image();
                            img.src = image.src;
                            imageCache.current.set(image.src, img);
                            
                            // Wait for new image to load
                            if (!img.complete) {
                                await new Promise((resolve, reject) => {
                                    img.onload = resolve;
                                    img.onerror = reject;
                                });
                            }
                        }
                        
                        if (img.complete) {
                            ctx.drawImage(img, displayX, displayY, displayWidth, displayHeight);
                        }
                    }
                };
                
                renderImages().catch(err => console.error('Map rendering error:', err));
            }, [activeScene.images, activeScene.grid?.enabled, gridTransform]);
            
            // Layer 2: Grid Canvas - renders grid lines (redraws on pan/zoom only)
            useEffect(() => {
                const canvas = gridCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                
                ctx.strokeStyle = activeScene.grid.color;
                ctx.lineWidth = 1.5 * gridTransform.zoom;
                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                
                // Fixed 100x100 grid centered at world origin (0, 0)
                // Grid extends from -50 to +50 cells in both directions
                const HALF_GRID = GRID_CELLS_TOTAL / 2;
                
                // Vertical lines (101 lines for 100 cells)
                for (let i = 0; i <= GRID_CELLS_TOTAL; i++) {
                    const worldX = (i - HALF_GRID) * activeScene.grid.size;
                    const screenX = worldX * gridTransform.zoom + gridTransform.panX;
                    ctx.moveTo(screenX, 0);
                    ctx.lineTo(screenX, height);
                }
                
                // Horizontal lines (101 lines for 100 cells)
                for (let i = 0; i <= GRID_CELLS_TOTAL; i++) {
                    const worldY = (i - HALF_GRID) * activeScene.grid.size;
                    const screenY = worldY * gridTransform.zoom + gridTransform.panY;
                    ctx.moveTo(0, screenY);
                    ctx.lineTo(width, screenY);
                }
                
                ctx.stroke();
            }, [activeScene.grid, gridTransform]);
            
            // Layer 4: Token Canvas - renders tokens (redraws when tokens move)
            useEffect(() => {
                const canvas = tokenCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                
                // Render tokens using image cache
                const renderTokens = async () => {
                    for (const token of tokens) {
                        const baseSize = token.size || 50;
                        const sizeMultiplier = token.sizeMultiplier || 1;
                        const actualSize = baseSize * sizeMultiplier;
                        const transformedX = token.x * gridTransform.zoom + gridTransform.panX;
                        const transformedY = token.y * gridTransform.zoom + gridTransform.panY;
                        const transformedSize = actualSize * gridTransform.zoom;
                        
                        // Check cache first
                        let img = imageCache.current.get(token.src);
                        if (!img) {
                            img = new Image();
                            img.src = token.src;
                            imageCache.current.set(token.src, img);
                            
                            // Wait for new image to load
                            if (!img.complete) {
                                await new Promise((resolve) => {
                                    img.onload = resolve;
                                    img.onerror = resolve; // Continue on error
                                });
                            }
                        }
                        
                        if (img.complete) {
                            ctx.save();
                            ctx.globalAlpha = token.locked ? 0.5 : 1.0;
                            
                            // Draw token as circle (clip to circle)
                            ctx.beginPath();
                            ctx.arc(
                                transformedX + transformedSize / 2, 
                                transformedY + transformedSize / 2, 
                                transformedSize / 2, 
                                0, 
                                2 * Math.PI
                            );
                            ctx.closePath();
                            ctx.clip();
                            
                            ctx.drawImage(img, transformedX, transformedY, transformedSize, transformedSize);
                            ctx.restore();
                            
                            // Draw token name label
                            if (token.name) {
                                ctx.save();
                                const labelY = transformedY + transformedSize - 8;
                                const fontSize = Math.max(12, transformedSize * 0.16);
                                ctx.font = `bold ${fontSize}px Times New Roman, serif`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                // Measure text for background
                                const text = token.name || 'Token';
                                const metrics = ctx.measureText(text);
                                const padding = 6;
                                const bgX = transformedX + transformedSize / 2 - metrics.width / 2 - padding;
                                const bgY = labelY - fontSize / 2 - 1;
                                const bgWidth = metrics.width + padding * 2;
                                const bgHeight = fontSize + 2;
                                
                                // Draw background
                                ctx.fillStyle = 'rgba(26, 26, 26, 0.95)';
                                ctx.fillRect(bgX, bgY, bgWidth, bgHeight);
                                
                                // Draw text
                                ctx.fillStyle = '#d4af37';
                                ctx.fillText(text, transformedX + transformedSize / 2, labelY);
                                ctx.restore();
                            }
                            
                        }
                    }
                };
                
                renderTokens().catch(err => console.error('Token rendering error:', err));
            }, [tokens, activeScene.grid?.enabled, gridTransform]);
            
            // Layer 5: UI Canvas - renders pointer and measurement (60fps when active)
            useEffect(() => {
                const canvas = uiCanvasRef.current;
                if (!canvas || !activeScene.grid?.enabled) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight - GRID_OFFSET_Y;
                const dpr = window.devicePixelRatio || 1;
                
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                
                // Clear canvas - UI elements rendered elsewhere for now
                ctx.clearRect(0, 0, width, height);
                
                // NOTE: Animation loop only starts when needed (pointer active, measurement active, etc.)
                // This saves CPU cycles when no real-time UI elements are being rendered
            }, [activeScene.grid?.enabled]);

            useEffect(() => {
                const repositionAvatars = () => {
                    if (!viewportRef.current) return;
                    setAvatars(prev => {
                        if (!prev || prev.length === 0) return prev;
                        const viewportRect = viewportRef.current.getBoundingClientRect();
                        const vw = viewportRect.width;
                        const vh = viewportRect.height;
                        const avatarWidth = prev[0].width || 180;
                        const avatarHeight = prev[0].height || 225;
                        const spacing = avatarWidth + 30;
                        const totalWidth = (prev.length - 1) * spacing + avatarWidth;
                        const startX = (vw / 2) - (totalWidth / 2);
                        const yPos = vh - avatarHeight - 50;
                        return prev.map((av, i) => ({
                            ...av,
                            x: startX + i * spacing,
                            y: yPos,
                            width: avatarWidth,
                            height: avatarHeight
                        }));
                    });
                };
                repositionAvatars();
                window.addEventListener('resize', repositionAvatars);
                return () => window.removeEventListener('resize', repositionAvatars);
            }, [avatars.length, viewportRef.current]);

            const saveScenesToLocalStorage = () => {
                try {
                    const payload = {
                        scenes,
                        avatars,
                        tokens,
                        drawings,
                        activeSceneIndex,
                        gridTransform,
                        dicePresets,
                        characterSheets,
                        diceModifiers
                    };
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(payload));
                    alert('Saved to localStorage.');
                } catch (err) {
                    console.error('Save failed', err);
                    alert('Save failed (see console).');
                }
            };

            const loadScenesFromLocalStorage = () => {
                const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (!raw) {
                    alert('No saved data found in localStorage.');
                    return;
                }
                if (!confirm('Load from localStorage? This will replace your current scenes and state.')) return;
                try {
                    const parsed = JSON.parse(raw);
                    if (parsed.scenes) {
                        if (parsed.avatars) {
                            setAvatars(parsed.avatars.map(a => ({ ...a, flipped: !!a.flipped })));
                        } else {
                            const collected = [];
                            parsed.scenes.forEach(s => {
                                if (Array.isArray(s.avatars)) {
                                    collected.push(...s.avatars);
                                }
                            });
                            if (collected.length > 0) {
                                setAvatars(collected.slice(0, 6).map(a => ({ ...a, flipped: !!a.flipped })));
                            } else {
                                setAvatars([]);
                            }
                        }
                        setScenes(parsed.scenes);
                        setTokens(parsed.tokens || []);
                        setDrawings(parsed.drawings || []);
                        setActiveSceneIndex(parsed.activeSceneIndex || 0);
                        setGridTransform(parsed.gridTransform || { zoom: 1, panX: 0, panY: 0 });
                        setDicePresets(parsed.dicePresets || dicePresets);
                        setCharacterSheets(parsed.characterSheets || []);
                        setDiceModifiers(parsed.diceModifiers || {});
                        alert('Loaded from localStorage.');
                    } else {
                        alert('Invalid data in localStorage.');
                    }
                } catch (err) {
                    console.error('Load failed', err);
                    alert('Load failed (see console).');
                }
            };

            const exportScenes = () => {
                try {
                    const payload = {
                        scenes,
                        avatars,
                        tokens,
                        drawings,
                        activeSceneIndex,
                        gridTransform,
                        dicePresets,
                        characterSheets,
                        diceModifiers,
                        exportedAt: new Date().toISOString()
                    };
                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `monomyth_export_${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (err) {
                    console.error('Export failed', err);
                    alert('Export failed (see console).');
                }
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.scenes) {
                            if (!confirm('Importing a file will replace your current scenes and state. Proceed?')) {
                                e.target.value = '';
                                return;
                            }
                            if (parsed.avatars) {
                                setAvatars(parsed.avatars.map(a => ({ ...a, flipped: !!a.flipped })));
                            } else {
                                const collected = [];
                                parsed.scenes.forEach(s => {
                                    if (Array.isArray(s.avatars)) {
                                        collected.push(...s.avatars);
                                    }
                                });
                                setAvatars(collected.slice(0, 6).map(a => ({ ...a, flipped: !!a.flipped })));
                            }
                            setScenes(parsed.scenes);
                            setTokens(parsed.tokens || []);
                            setDrawings(parsed.drawings || []);
                            setActiveSceneIndex(parsed.activeSceneIndex || 0);
                            setGridTransform(parsed.gridTransform || { zoom: 1, panX: 0, panY: 0 });
                            setDicePresets(parsed.dicePresets || dicePresets);
                            setCharacterSheets(parsed.characterSheets || []);
                            setDiceModifiers(parsed.diceModifiers || {});
                            alert('Import successful.');
                        } else if (Array.isArray(parsed)) {
                            if (!confirm('Importing a file will replace your current scenes. Proceed?')) {
                                e.target.value = '';
                                return;
                            }
                            const collected = [];
                            parsed.forEach(s => {
                                if (Array.isArray(s.avatars)) collected.push(...s.avatars);
                            });
                            setAvatars(collected.slice(0, 6).map(a => ({ ...a, flipped: !!a.flipped })));
                            setScenes(parsed);
                            alert('Import successful (scenes only).');
                        } else {
                            alert('Invalid import file format.');
                        }
                    } catch (err) {
                        console.error('Import failed', err);
                        alert('Import failed (see console).');
                    } finally {
                        e.target.value = '';
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="w-full h-screen bg-zinc-900 flex flex-col overflow-hidden relative">
                    {/* Splash Screen */}
                    {showSplash && (
                        <div
                            style={{
                                position: 'fixed',
                                top: 0,
                                left: 0,
                                right: 0,
                                bottom: 0,
                                backgroundColor: 'rgba(0, 0, 0, 0.95)',
                                zIndex: 10000,
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                animation: 'fadeIn 0.5s ease-in'
                            }}
                        >
                            <style>
                                {`
                                    @keyframes fadeIn {
                                        from { opacity: 0; }
                                        to { opacity: 1; }
                                    }
