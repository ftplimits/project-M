<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SDK Test</title>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:40px;">
    <h1>Discord SDK Injection Test</h1>
    <div id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(msg) {
            log.innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        addLog('📍 Test started');
        addLog('📍 URL: ' + window.location.href);
        addLog('📍 In iframe: ' + (window.self !== window.top));
        addLog('📍 Timestamp: ' + new Date().toISOString());
        addLog('---');
        
        let checks = 0;
        const interval = setInterval(() => {
            checks++;
            const exists = typeof DiscordSDK !== 'undefined';
            addLog(`Check ${checks}: DiscordSDK ${exists ? '✅ FOUND' : '❌ undefined'}`);
            
            if (exists) {
                clearInterval(interval);
                addLog('---');
                addLog('🎉 SUCCESS! DiscordSDK is being injected!');
                addLog('DiscordSDK constructor: ' + typeof DiscordSDK);
            } else if (checks >= 30) {
                clearInterval(interval);
                addLog('---');
                addLog('❌ FAILED after 3 seconds');
                addLog('Discord is NOT injecting the SDK');
            }
        }, 100);
    </script>
</body>
</html>
